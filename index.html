        hasVideo: false,
        textContent: `

            <h2>How Jet Engines Produce Thrust: The Brayton Cycle</h2>
            <p>A modern turbofan jet engine is essentially a continuous, highly controlled explosion tube. Unlike a car engine which pulses in distinct, separate strokes, a jet engine operates continuously on the <span class="physics-term" data-definition="A thermodynamic cycle describing the workings of a constant-pressure heat engine.">Brayton Thermodynamic Cycle</span>, which aviation engineers affectionately summarize in four words: <em>Suck, Squeeze, Bang, Blow.</em></p>

            <div class="content-grid">
                <div class="glass-panel">
                    <h3><i data-lucide="fan"></i> 1. Suck (Intake)</h3>
                    <p>The massive, curved titanium fan blades at the front of the engine suck in literally tons of dense, cold atmospheric air every single second.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="minimize-2"></i> 2. Squeeze (Compression)</h3>
                    <p>The air enters the core compressor—a long series of rapidly spinning blades that get progressively smaller and tighter. This violently forces the air into a tiny space, raising its pressure immensely and causing its temperature to spike (up to 400°C) simply from the extreme <span class="physics-term" data-definition="The heating of a gas when it is compressed without heat being added.">Adiabatic Compression</span>.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="flame"></i> 3. Bang (Combustion)</h3>
                    <p>Highly refined Jet-A fuel is finely atomized and sprayed directly into this highly compressed, scorching air inside the combustion chamber and ignited. The continuous, infernal explosion expands the gases violently.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="wind"></i> 4. Blow (Exhaust)</h3>
                    <p>The rapidly expanding, superheated gas shoots out the back. But before it escapes, it passes through the <strong>Turbine Section</strong>, crashing into blades and spinning them at incredible speeds. The turbine is physically connected by a long metal shaft straight through the engine to the front fan and compressor, mechanically forcing them to keep spinning and sucking in more air, keeping the whole violent cycle running endlessly.</p>
                </div>
            </div>

            <div class="highlight-box">
                <h3><i data-lucide="fast-forward"></i> Newton's Application & Thrust</h3>
                <p>According to Newton's Third Law of Motion, the massive, concentrated force of the hot exhaust gases (and the cold bypass air) blasting violently out the back of the engine creates an equal, opposite, and unstoppable physical force that pushes the massive engine (and the heavy airplane attached to it) forward through the sky. This raw physical pushing power is known as <span class="physics-term" data-definition="The forward force produced by the powerplant.">Aerodynamic Thrust</span>.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "What extracts energy from the hot exhaust gas to drive the compressor at the front?", options: ["The Fan", "The Combustor", "The Turbine", "The Nozzle"], answer: 2, exp: "The hot expanding gases spin the rear turbine, which is physically connected by a shaft to the front compressor." },
            { type: 'fill-blank', q: "According to Newton's Third Law, the massive force of exhaust blasting backwards creates a forward force called _________.", answer: "thrust", altAnswers: ["Thrust", "thrust"], exp: "Thrust is the raw physical pushing power generated by the engine." },
            { type: 'match', q: "Match the step of the Brayton Cycle to its aviation nickname:", pairs: [ { left: "Intake", right: "Suck" }, { left: "Compression", right: "Squeeze" }, { left: "Combustion", right: "Bang" }, { left: "Exhaust", right: "Blow" } ], exp: "Suck, Squeeze, Bang, Blow elegantly summarizes continuous jet combustion." },
            { type: 'mcq', q: "What is the primary function of the combustor?", options: ["To compress air", "To mix high-pressure air with fuel and ignite it continuously", "To steer the aircraft", "To cool the engine"], answer: 1, exp: "It acts as a continuous blowtorch." },
            { type: 'fill-blank', q: "The _________ section of the engine contains thousands of tiny airfoils that spin to squeeze the air to incredibly high pressures.", answer: "compressor", altAnswers: ["Compressor", "compressor"], exp: "Compression is required to make the fuel burn efficiently." },
            { type: 'match', q: "Match the component to its thermal environment:", pairs: [ { left: "Compressor Blades", right: "Warm to hot (due to squeezing friction)" }, { left: "Combustion Chamber", right: "Inferno (Over 2000 degrees Celsius)" }, { left: "Turbine Blades", right: "Extreme Heat (Requires cooling holes)" } ], exp: "The materials must withstand incredible thermal stress." },
            { type: 'mcq', q: "How do turbine blades survive being blasted by 2000-degree exhaust when their melting point is lower than that?", options: ["They are covered in ice", "They have tiny laser-drilled holes that bleed cool air over their surface, creating a protective thermal blanket", "They are made of diamond", "They rotate so fast they don't get hot"], answer: 1, exp: "Film cooling is one of the greatest achievements in aerospace metallurgy." },
            { type: 'fill-blank', q: "Unlike a car engine which operates in distinct strokes, a jet engine operates on a _________ combustion cycle.", answer: "continuous", altAnswers: ["Continuous", "continuous"], exp: "The fire in a jet engine never goes out during flight." },
            { type: 'mcq', q: "What shapes the exhaust gas to maximize the velocity as it exits the engine?", options: ["The fan", "The exhaust nozzle", "The wing", "The tail"], answer: 1, exp: "The nozzle pinches the airflow, accelerating it to immense speeds." },
            { type: 'mcq', q: "What happens to the pressure of the air as it passes through the compressor?", options: ["It drops rapidly", "It stays the same", "It increases drastically, sometimes up to 40 times atmospheric pressure", "It turns to liquid"], answer: 2, exp: "Squeezing the air concentrates the oxygen for a more powerful explosion." }
        ]
    },
    {
        id: "oil-fuel-systems",

        textContent: `
            <iframe 
                src="components/oil_fuel_systems_simulation.html"

            <h2>Oil & Fuel Systems: The Lifeblood</h2>
            <p>Aircraft engines are terrifyingly powerful machines that require two vital fluid systems to survive: Jet Fuel to burn for raw explosive thrust, and highly engineered Synthetic Oil to prevent the engine from violently tearing itself apart through internal mechanical friction.</p>

            <div class="content-grid">
                <div class="glass-panel">
                    <h3><i data-lucide="droplet"></i> The Fuel System</h3>
                    <p>Commercial jet fuel (Jet-A) is essentially highly refined, purified kerosene. Unlike automobiles that store fuel in a thick, dedicated trunk tank, a massive airliner strategically stores its fuel literally inside the hollow, internal structures of the main wings (known as "wet wings"). This keeps the immensely heavy weight of the dense fuel centered directly over the aerodynamic source of lift, dramatically reducing the structural <span class="physics-term" data-definition="The stress caused by bending moments applied to a structural element.">Bending Stress</span> on the wing roots where they attach to the fuselage.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="activity"></i> The Oil System</h3>
                    <p>Turbofan engine cores spin at tens of thousands of RPMs. Without flawless, uninterrupted lubrication, the heavy metal bearings would melt from extreme <span class="physics-term" data-definition="The resistance that one surface or object encounters when moving over another.">Friction</span> in a matter of seconds, seizing the engine instantly. Aviation oil is highly synthetic, chemically engineered to withstand infernal temperatures without breaking down, losing its <span class="physics-term" data-definition="A measure of a fluid's resistance to gradual deformation by shear stress or tensile stress.">Viscosity</span>, or catching fire.</p>
                </div>
            </div>

            <div class="highlight-box">
                <h3><i data-lucide="thermometer-snowflake"></i> A Genius Exchange of Thermodynamics</h3>
                <p>At 35,000 feet, the vast quantities of fuel sitting exposed in the thin aluminum wings become dangerously, freezing cold, while the oil churning inside the violently spinning engine gets dangerously, scorching hot. Aircraft engineers elegantly solve both extreme problems using a <span class="physics-term" data-definition="A device built for efficient heat transfer from one medium to another.">Fuel/Oil Heat Exchanger</span>. The scalding hot engine oil is piped immediately past the freezing cold wing fuel. The fuel acts as a <span class="physics-term" data-definition="An environment or object that absorbs and dissipates heat.">Heat Sink</span>, absorbing the thermal energy. This heavily warms up the fuel (ensuring ice crystals don't form and clog the fuel filters) and simultaneously rapidly cools down the oil in return! It is a masterpiece of thermodynamic recycling.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "Where do modern commercial airliners store the vast majority of their jet fuel?", options: ["In the belly cargo hold", "In a large tank behind the cockpit", "Inside the hollow internal structures of the wings", "In external drop tanks"], answer: 2, exp: "Storing fuel in 'wet wings' keeps the heavy weight directly over the source of aerodynamic lift." },
            { type: 'fill-blank', q: "To solve the extreme temperature problems of both fluids, aircraft use a Fuel/Oil _________ Exchanger.", answer: "heat", altAnswers: ["Heat", "heat"], exp: "The Heat Exchanger uses cold fuel to cool down hot oil, while the hot oil warms up the freezing fuel." },
            { type: 'match', q: "Match the fluid to its operational challenge at 35,000 feet:", pairs: [ { left: "Jet Fuel in the wings", right: "Becomes dangerously freezing cold" }, { left: "Synthetic Oil in the engine", right: "Becomes scorchingly hot from friction" }, { left: "Fuel/Oil Heat Exchanger", right: "Recycles thermal energy between the two" } ], exp: "Thermodynamic recycling is essential for fluid health." },
            { type: 'mcq', q: "What happens if jet fuel becomes too cold during a long flight?", options: ["It burns brighter", "It can become slushy and block the fuel filters", "It evaporates", "It generates electricity"], answer: 1, exp: "Wax crystals can form in freezing jet fuel, starving the engines." },
            { type: 'fill-blank', q: "The oil system is a closed _________ that constantly recirculates synthetic oil.", answer: "loop", altAnswers: ["Loop", "loop"], exp: "Oil is pumped, heated, cooled, filtered, and pumped again." },
            { type: 'match', q: "Match the fluid to its primary purpose:", pairs: [ { left: "Jet Fuel", right: "Burned to create thrust" }, { left: "Engine Oil", right: "Lubricates and cools bearings" }, { left: "Hydraulic Fluid", right: "Pushes flight controls" } ], exp: "Fluids are the lifeblood of the aircraft." },
            { type: 'mcq', q: "Why is storing fuel in the wings beneficial for the aircraft structure?", options: ["It relieves upward bending stress on the wing root", "It makes the plane look cooler", "It prevents lightning strikes", "It keeps the cabin warm"], answer: 0, exp: "The weight of the fuel pushes down, counteracting the massive upward lifting force of the wings." },
            { type: 'fill-blank', q: "Fuel is pumped from the wings to the engines via powerful _________ pumps.", answer: "boost", altAnswers: ["Boost", "boost", "fuel"] , exp: "Boost pumps ensure the engine never starves for fuel." },
            { type: 'mcq', q: "What type of oil is used in modern jet engines?", options: ["Standard Motor Oil (10W-30)", "Olive Oil", "Highly specialized Synthetic Oil", "Vegetable Oil"], answer: 2, exp: "Standard oil would boil away instantly in a jet engine." },
            { type: 'mcq', q: "Does the Fuel/Oil Heat Exchanger consume electrical power to heat the fuel?", options: ["Yes, it uses giant electric coils", "No, it uses waste heat passively transferred from the hot oil", "Yes, it burns fuel to make heat", "No, it uses solar power"], answer: 1, exp: "It is a passive thermodynamic exchange." }
        ]
    },
    {
        id: "monitor-oil-fuel",
        title: "Why monitor oil & fuel?",
        hasVideo: false,
        textContent: `

            <h2>Monitoring Oil & Fuel</h2>
            <p>Pilots obviously cannot open the hood mid-flight to check an analog oil dipstick. They rely entirely on incredibly advanced digital sensor networks, telemetry data, and massive glass displays in the cockpit to monitor the absolute health of the fluid systems in real-time.</p>

            <table class="feature-table">
                <thead>
                    <tr>
                        <th>Parameter Monitored</th>
                        <th>Why It Matters</th>
                        <th>Critical Warning Sign</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Oil Pressure</strong></td>
                        <td>Ensures highly viscous oil is successfully reaching the high-speed turbine bearings.</td>
                        <td>A sudden drop in pressure implies a severed hydraulic line, a massive leak, or a failing mechanical pump. Catastrophic engine seizure is imminent.</td>
                    </tr>
                    <tr>
                        <td><strong>Oil Temperature</strong></td>
                        <td>Monitors the internal thermal health and friction levels of the engine core.</td>
                        <td>A rapidly spiking temperature implies excessive metal-on-metal friction or a completely failed Fuel/Oil <span class="physics-term" data-definition="A device that transfers heat between two fluids without mixing them.">Heat Exchanger</span>.</td>
                    </tr>
                    <tr>
                        <td><strong>Fuel Flow</strong></td>
                        <td>Tracks the exact volume of fuel consumption (measured precisely in pounds or kilograms per hour).</td>
                        <td>Abnormal flow that doesn't match engine thrust indicates an internal engine blockage or a massive, dangerous external fuel leak.</td>
                    </tr>
                    <tr>
                        <td><strong>Fuel Imbalance</strong></td>
                        <td>Ensures the heavy weight of the fuel is distributed perfectly equally between the left and right wings.</td>
                        <td>If one wing is significantly heavier, the plane's <span class="physics-term" data-definition="The exact point where the total mass of the aircraft is perfectly balanced.">Center of Gravity</span> shifts, and it will constantly want to roll over, requiring exhausting aerodynamic correction.</td>
                    </tr>
                </tbody>
            </table>

            <div class="highlight-box">
                <h3><i data-lucide="monitor"></i> EICAS / ECAM Displays</h3>
                <p>Instead of walls of confusing analog dials, modern planes use the Engine Indicating and Crew Alerting System (EICAS) or Electronic Centralized Aircraft Monitor (ECAM). These intelligent digital screens automatically monitor thousands of data points. They only highlight parameters in flashing amber or critical red if they deviate from mathematically normal limits, instantly alerting the pilots to an anomaly before it becomes a disaster.</p>
            </div>
            
        `,

            { type: 'fill-blank', q: "Modern cockpits use intelligent digital screens like EICAS or ECAM to track _________ data.", answer: "telemetry", altAnswers: ["Telemetry", "telemetry"], exp: "These digital screens process thousands of data points and only alert pilots to abnormal deviations." },
            { type: 'match', q: "Match the fluid parameter to the warning sign it indicates:", pairs: [ { left: "Low Oil Pressure", right: "Imminent Engine Seizure" }, { left: "High Oil Temperature", right: "Failed Heat Exchanger" }, { left: "Fuel Imbalance", right: "Dangerous Center of Gravity shift" } ], exp: "Pilots rely on digital telemetry to monitor the lifeblood of the aircraft." },
            { type: 'mcq', q: "What does a 'Fuel Imbalance' mean?", options: ["The fuel is bad quality", "One wing has significantly more fuel weight than the other", "The plane is flying too high", "The engines are burning oil"], answer: 1, exp: "A heavy wing will cause the plane to constantly try to roll to that side." },
            { type: 'fill-blank', q: "To fix a fuel imbalance, pilots open a _________-feed valve to route fuel from the heavy wing to the opposite engine.", answer: "cross", altAnswers: ["Cross", "cross"] , exp: "Cross-feeding allows any engine to drink from any tank." },
            { type: 'match', q: "Match the cockpit system to its function:", pairs: [ { left: "ECAM / EICAS", right: "Engine & Caution Monitoring Screens" }, { left: "Fuel Quantity Indicators", right: "Shows remaining pounds of fuel" }, { left: "Master Warning Light", right: "Flashes red for critical failures" } ], exp: "Modern cockpits consolidate thousands of dials into clean digital screens." },
            { type: 'mcq', q: "Why do pilots measure fuel in Pounds or Kilograms instead of Gallons?", options: ["Because it sounds cooler", "Because the volume (gallons) shrinks when it gets cold, but the mass (pounds) stays constant", "Because the gauges are old", "Because water is measured in gallons"], answer: 1, exp: "Energy content is tied to mass, not volume." },
            { type: 'fill-blank', q: "If oil temperature spikes, the _________ might be failing to cool it.", answer: "exchanger", altAnswers: ["Exchanger", "exchanger", "heat exchanger"] , exp: "The Fuel/Oil heat exchanger is responsible for cooling the oil." },
            { type: 'mcq', q: "What action must a pilot immediately take if an engine completely loses oil pressure?", options: ["Accelerate", "Shut down that engine to prevent it from tearing itself apart", "Pump more fuel into it", "Turn on the wipers"], answer: 1, exp: "A seized engine can throw shrapnel; it must be shut down safely." },
            { type: 'mcq', q: "Do modern aircraft constantly barrage the pilots with every single telemetry data point?", options: ["Yes, pilots read thousands of numbers constantly", "No, the 'Dark Cockpit' philosophy means screens stay blank unless something is wrong", "Yes, it prints them on paper", "No, the aircraft flies itself completely"], answer: 1, exp: "A dark screen is a happy screen." }

    <script>
window.courseData.push(
    {
        id: "hydraulic-pneumatic",
        title: "Hydraulic and Pneumatic Systems",
        hasVideo: false,
        textContent: `
            <iframe 
                src="components/hydraulic_pneumatic_simulation.html"
                style="width:100%; height:520px; border:none;">
            </iframe>

            <h2>Hydraulic & Pneumatic Systems: Fluid Power</h2>
            <p>Commercial airplanes are massive, terrifyingly heavy machines moving at near the speed of sound. Human muscles are simply not strong enough to manually push a 2-ton vertical rudder against 500 MPH aerodynamic winds. To solve this, the aircraft relies entirely on fluid dynamics to multiply force.</p>

            <div class="content-grid">
                <div class="glass-panel">
                    <h3><i data-lucide="waves"></i> Hydraulics (Liquid Power)</h3>
                    <p>Because liquids (like specialized Skydrol hydraulic fluid) are physically <span class="physics-term" data-definition="A fluid whose density cannot be changed by squeezing it into a smaller volume.">Incompressible</span>, forcefully pushing fluid into one end of a closed pipe instantly and violently pushes whatever mechanical piston is at the other end. Hydraulics are utilized when immense, rigid, instantaneous, and unrelenting physical power is required (e.g., slamming down the heavy landing gear, crushing the carbon brakes, or holding primary flight controls steady against gale-force winds).</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="wind"></i> Pneumatics (Gas Power)</h3>
                    <p>Unlike liquids, gases (like atmospheric air) are highly compressible. They act more like a powerful, elastic spring rather than a solid rod. Pneumatic systems are utilized for aircraft components that require a massive, steady flow of kinetic energy rather than rigid, locking pushing power (e.g., rapidly spinning up the massive jet engine turbines during startup, pumping air conditioning into the cabin, or blowing scorching air over the wings for anti-ice systems).</p>
                </div>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "Why are Hydraulic systems used for heavy-duty tasks like moving flight controls?", options: ["Because liquids are lighter than air", "Because liquids are physically incompressible, allowing immediate transfer of massive force", "Because hydraulic fluid burns easily for thrust", "Because it looks cool"], answer: 1, exp: "Incompressible liquids allow for rigid, immediate, and unrelenting pushing power." },
            { type: 'fill-blank', q: "Unlike liquids, gases used in Pneumatic systems are highly _________, acting more like an elastic spring.", answer: "compressible", altAnswers: ["Compressible", "compressible"], exp: "Pneumatics provide a steady flow of kinetic energy rather than rigid pushing power." },
            { type: 'match', q: "Match the fluid dynamic principle to its aircraft application:", pairs: [ { left: "Hydraulics (Incompressible Liquid)", right: "Slamming down heavy landing gear" }, { left: "Pneumatics (Compressible Gas)", right: "Spinning up jet engine turbines" } ], exp: "Hydraulics are the muscles; pneumatics provide the breath." },
            { type: 'mcq', q: "At what pressure do modern airliner hydraulic systems typically operate?", options: ["50 PSI", "3,000 to 5,000 PSI", "100,000 PSI", "10 PSI"], answer: 1, exp: "This extreme pressure allows small actuators to move massive flight controls." },
            { type: 'fill-blank', q: "A common synthetic hydraulic fluid used in aviation, known for its purple color and fire resistance, is _________.", answer: "skydrol", altAnswers: ["Skydrol", "skydrol"] , exp: "Skydrol is highly toxic and corrosive to paint, but it won't easily catch fire." },
            { type: 'match', q: "Match the system to what it primarily powers:", pairs: [ { left: "Hydraulic System", right: "Wheel Brakes & Landing Gear" }, { left: "Pneumatic System", right: "Air Conditioning & Anti-Ice" }, { left: "Electrical System", right: "Avionics & Lighting" } ], exp: "Different power types are suited for different jobs." },
            { type: 'mcq', q: "Why can't you use pneumatics to operate the wheel brakes?", options: ["Air is too heavy", "Air is compressible, so the brakes would feel 'spongy' and lack instant clamping force", "Air would freeze the brakes", "Air would make them too loud"], answer: 1, exp: "Incompressible liquids guarantee that 1 inch of pedal movement equals immediate clamping force." },
            { type: 'fill-blank', q: "When pneumatic air is used to melt ice off the wings, it is called the _________-ice system.", answer: "anti", altAnswers: ["Anti", "anti"] , exp: "Hot bleed air is routed through the leading edges of the wings." },
            { type: 'mcq', q: "How is hydraulic fluid pushed through the lines?", options: ["By gravity", "By Engine-Driven Pumps (EDPs)", "By passenger pedaling", "By wind"], answer: 1, exp: "The spinning engine directly turns a pump to pressurize the fluid." },
            { type: 'mcq', q: "If a hydraulic line gets severed, what happens?", options: ["The fluid sprays out at high pressure and the system loses all power", "The fluid turns to gas", "The plane explodes", "Nothing happens"], answer: 0, exp: "This is why aircraft have multiple redundant hydraulic systems." }
        ]
    },
    {
        id: "function-hydro-pneumatic",
        title: "Main Function of Hydraulic/Pneumatic",
        hasVideo: false,
        textContent: `

            <h2>Function of Hydro/Pneumatic Systems</h2>
            <p>The aircraft uses powerful engine-driven mechanical pumps and spinning compressors to violently pressurize these vital fluid networks, turning the raw chemical energy of burning jet fuel into usable mechanical utility throughout the entire length of the plane.</p>

            <table class="feature-table">
                <thead>
                    <tr>
                        <th>Fluid System Type</th>
                        <th>Primary Source of Power</th>
                        <th>Critical Uses on Aircraft</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Hydraulics (3000-5000 PSI)</strong></td>
                        <td>Engine-Driven Hydraulic Pumps (EDP) attached to the accessory gearbox.</td>
                        <td>Actuating Ailerons, Elevators, Rudder, extending/retracting heavy Flaps, violently deploying Landing Gear, powering the Wheel Brakes, and allowing Nose Wheel Steering on the ground.</td>
                    </tr>
                    <tr>
                        <td><strong>Pneumatics (Bleed Air)</strong></td>
                        <td>High-pressure air stolen from the Engine Compressor Stages.</td>
                        <td>Cabin Pressurization, Air Conditioning, Engine Anti-Ice (melting dangerous ice formations on the wings), and physically spinning the engines for the Engine Starting sequence.</td>
                    </tr>
                </tbody>
            </table>

            <div class="highlight-box">
                <h3><i data-lucide="shield-alert"></i> The Law of Triple Redundancy</h3>
                <p>Because completely losing hydraulic fluid pressure means losing the physical ability to steer the aircraft's control surfaces, large airliners boast three completely separate, physically isolated hydraulic networks (often colored Green, Blue, and Yellow). If a catastrophic engine explosion cuts the Green hydraulic lines, the fluid bleeds out, but the independent Blue and Yellow systems possess enough <span class="physics-term" data-definition="The inclusion of extra components which are not strictly necessary to functioning, in case of failure.">Redundancy</span> to still safely fly and land the airplane.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "What is the 'Law of Triple Redundancy' in commercial aircraft hydraulics?", options: ["Every plane must have three pilots", "Having three completely separate hydraulic networks so the plane can still fly if one or two fail", "Using three types of fluid", "Pumping the fluid three times as fast"], answer: 1, exp: "Redundancy ensures that a single point of failure (like a severed line) doesn't cause a crash." },
            { type: 'fill-blank', q: "Pneumatic systems rely on stealing high-pressure _________ Air from the spinning engine compressors.", answer: "bleed", altAnswers: ["Bleed", "bleed"], exp: "Bleed Air is incredibly hot and pressurized, powering cabin air conditioning and anti-ice systems." },
            { type: 'match', q: "Match the System to its primary source of power:", pairs: [ { left: "Hydraulics (3000-5000 PSI)", right: "Engine-Driven Hydraulic Pumps (EDP)" }, { left: "Pneumatics", right: "Air stolen from Engine Compressors" } ], exp: "The spinning jet engine powers both the hydraulic and pneumatic networks." },
            { type: 'mcq', q: "What does the PTU (Power Transfer Unit) do?", options: ["Transfers passengers", "Transfers hydraulic pressure between two separate systems without mixing their fluids", "Pumps fuel", "Generates electricity"], answer: 1, exp: "If System A's pump fails, the PTU uses System B's pressure to power System A's lines." },
            { type: 'fill-blank', q: "The PTU makes a very loud, distinctive 'barking' _________ sound under the cabin floor when operating.", answer: "dog", altAnswers: ["Dog", "dog"] , exp: "Frequent flyers recognize the 'barking dog' sound during taxiing." },
            { type: 'match', q: "Match the backup system to its function:", pairs: [ { left: "Engine Driven Pump (EDP)", right: "Primary hydraulic source" }, { left: "Electric Motor Pump (EMP)", right: "Secondary hydraulic source" }, { left: "Ram Air Turbine (RAT)", right: "Last-resort emergency windmill" } ], exp: "Airliners have backups for their backups." },
            { type: 'mcq', q: "What deploys if ALL engines and ALL normal hydraulic pumps fail?", options: ["A parachute", "The Ram Air Turbine (RAT), a small windmill that drops from the belly to provide emergency hydraulic pressure", "Airbags", "Solar panels"], answer: 1, exp: "The RAT spins in the slipstream to keep the flight controls working." },
            { type: 'fill-blank', q: "Pneumatic bleed air is routed through the leading edges of the wings to prevent _________ buildup.", answer: "ice", altAnswers: ["Ice", "ice"] , exp: "Ice disrupts the smooth airflow and destroys lift." },
            { type: 'mcq', q: "Can hydraulic fluids from System A and System B mix together?", options: ["Yes, they share the same tank", "No, they are kept completely isolated so a leak in one doesn't drain the other", "Yes, but only in the air", "No, they are different colors"], answer: 1, exp: "Isolation is the key to true redundancy." },
            { type: 'mcq', q: "How does the landing gear retract?", options: ["A pilot cranks a wheel", "Massive hydraulic actuators push them into the wheel wells", "Wind pushes them back", "Electric servos"], answer: 1, exp: "Hydraulics provide the immense force required to fold up the heavy gear against the wind." }
        ]
    },
    {
        id: "electrical-ignition",
        title: "Electrical & Ignition Systems",
        hasVideo: false,
        textContent: `
            <iframe 
                src="components/electrical_ignition_simulation.html"
                style="width:100%; height:520px; border:none;">
            </iframe>

            <h2>Electrical & Ignition Systems</h2>
            <p>A modern airliner is a flying supercomputer. It generates enough raw electrical wattage to comfortably power a small neighborhood block. This massive electrical grid is the absolute lifeblood of the digital avionics, the fly-by-wire sensors, and the vast interior lighting arrays.</p>

            <div class="content-grid">
                <div class="glass-panel">
                    <h3><i data-lucide="zap"></i> Generators (IDG)</h3>
                    <p>Physically attached to the spinning gearbox of each main engine is an Integrated Drive Generator (IDG). As the jet engine spins at thousands of RPMs, it violently turns the IDG, producing extremely stable 115-volt <span class="physics-term" data-definition="An electric current which periodically reverses direction.">Alternating Current (AC)</span> power. This represents the primary, heavy-duty source of electricity for the aircraft while in flight.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="battery"></i> Deep-Cycle Batteries</h3>
                    <p>Heavy-duty Lithium-Ion or NiCad chemical batteries are securely stored in the forward avionics bay. They provide the ultimate emergency backup power to keep essential digital flight instruments and radio transmitters running if all engines (and their attached generators) suffer a catastrophic failure.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="flame"></i> Ignition Exciters</h3>
                    <p>Unlike a standard car engine which fires a spark plug thousands of times every minute to ignite individual bursts of fuel, a jet engine's combustion is one continuous, unending explosion. The high-voltage spark igniters are therefore only used during the initial engine startup sequence, or turned on during heavy rain and violent turbulence to actively prevent the continuous flame from accidentally blowing out.</p>
                </div>
            </div>

            <div class="highlight-box">
                <h3><i data-lucide="power"></i> The Auxiliary Power Unit (APU)</h3>
                <p>When the massive airliner is parked at the airport gate with its main engines completely shut off, how does the plane still have blazing interior lights, functioning digital screens, and blasting air conditioning? The secret is the <strong>Auxiliary Power Unit (APU)</strong>—a miniature, independent jet engine hidden in the very tail cone of the aircraft. It burns fuel from the main tanks just to run a dedicated electrical generator and a pneumatic air compressor, keeping the plane "alive" and comfortable on the ground without wasting the lifespan of the massive main engines.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "What provides electrical power to the aircraft while it is parked at the gate with main engines off?", options: ["The Integrated Drive Generator (IDG)", "The Auxiliary Power Unit (APU) hidden in the tail", "Solar panels on the wings", "AA Batteries"], answer: 1, exp: "The APU is a miniature jet engine that burns fuel to run an electrical generator and air compressor." },
            { type: 'fill-blank', q: "When flying, the Integrated Drive Generator (IDG) produces 115-volt _________ Current (AC) power.", answer: "alternating", altAnswers: ["Alternating", "alternating", "AC", "ac"], exp: "AC power is the heavy-duty primary source of electricity for the aircraft." },
            { type: 'match', q: "Match the electrical component to its role:", pairs: [ { left: "Generators (IDG)", right: "Primary AC power in flight" }, { left: "Deep-Cycle Batteries", right: "Emergency backup power" }, { left: "Ignition Exciters", right: "Sparks used only during startup/turbulence" } ], exp: "A modern airliner relies entirely on its complex electrical grid." },
            { type: 'mcq', q: "What does the Transformer Rectifier Unit (TRU) do?", options: ["Transforms the plane into a robot", "Converts 115V AC power into 28V DC power for sensitive electronics", "Pumps fuel", "Generates thrust"], answer: 1, exp: "Computers and screens require smooth DC power." },
            { type: 'fill-blank', q: "In a jet engine, the massive spark plugs are called _________.", answer: "igniters", altAnswers: ["Igniters", "igniters", "igniter"] , exp: "Igniters create a massive electrical arc to light the fuel." },
            { type: 'match', q: "Match the power source to its output:", pairs: [ { left: "Integrated Drive Generator", right: "115V AC" }, { left: "Main Battery", right: "28V DC" }, { left: "Igniter Box", right: "20,000+ Volts" } ], exp: "Voltage is stepped up or down depending on the need." },
            { type: 'mcq', q: "Unlike a car, when do the igniters in a jet engine typically spark?", options: ["Constantly during the entire flight", "Only during engine startup, heavy rain, or severe turbulence", "Only when landing", "Never"], answer: 1, exp: "The fire in a jet engine is self-sustaining. Sparks are only needed to light it initially or prevent it from blowing out." },
            { type: 'fill-blank', q: "The APU is usually located in the very _________ of the aircraft fuselage.", answer: "tail", altAnswers: ["Tail", "tail", "rear"] , exp: "The tail provides a safe, isolated spot for the APU exhaust." },
            { type: 'mcq', q: "What happens if both IDGs fail in flight?", options: ["The plane falls", "The APU can be started in mid-air to provide backup electrical power", "The passengers must pedal", "The batteries will last for 10 hours"], answer: 1, exp: "The APU is a crucial backup generator." },
            { type: 'mcq', q: "Why do aircraft use 400 Hz AC power instead of the 60 Hz used in standard homes?", options: ["It is quieter", "Higher frequency allows for much smaller, lighter transformers and motors, saving massive weight", "It looks better", "It prevents lightning"], answer: 1, exp: "Weight is everything in aerospace; 400Hz equipment is much lighter." }
        ]
    },
    {
        id: "engine-start",
        title: "Which part initiates the engine start?",
        hasVideo: false,
        textContent: `

            <h2>The Engine Start Sequence: Waking the Beast</h2>
            <p>You cannot simply turn a metal key to start a massive, 10-ton turbofan engine. A jet engine must be forcefully, physically spun up to thousands of RPMs to violently compress enough incoming air <em>before</em> any highly volatile fuel or electrical spark is introduced. The sequence must be perfectly, meticulously timed by the computers.</p>

            <div class="highlight-box">
                <h3><i data-lucide="activity"></i> The Highly Choreographed Starting Sequence</h3>
                <ol style="margin-left: 1rem; margin-top: 1rem; color: var(--text-light);">
                    <li><strong>Air Supply:</strong> High-pressure pneumatic <span class="physics-term" data-definition="Compressed air taken from the engine compressor stage before fuel is injected.">Bleed Air</span> from the spinning APU in the tail (or a yellow ground cart) is forcefully routed into the dormant main engine.</li>
                    <li><strong>Spinning the Turbine:</strong> This high-pressure air blasts into a small Air Turbine Starter mechanism, which uses a reduction gearbox to physically grab and violently rotate the massive, heavy core of the main jet engine.</li>
                    <li><strong>Airflow Established:</strong> As the core spins up, the massive front compressor begins aggressively sucking in air from the atmosphere, reaching around 20% of its maximum RPM purely from the starter motor.</li>
                    <li><strong>Ignition:</strong> The pilot flips the ignition switch. The high-voltage spark igniters begin clicking rapidly inside the dark combustion chamber, creating a continuous arc of electricity.</li>
                    <li><strong>Fuel Flow:</strong> The pilot finally introduces Jet-A fuel. It is perfectly atomized and sprays directly into the spinning, sparking, highly compressed air.</li>
                    <li><strong>Light-off:</strong> The volatile mixture violently ignites. The sudden expansion of the superheated exhaust gas forcefully spins the rear turbine. The engine is now entirely self-sustaining, generating its own power, and the pneumatic starter automatically disconnects.</li>
                </ol>
            </div>

            <p>If the jet fuel is introduced too early, or the engine isn't physically spinning fast enough to blow the explosive fire out the back, the massive flames will actually shoot forward out of the intake fan—a highly dangerous, visually terrifying event known as a <span class="physics-term" data-definition="When an engine overheats severely during start because airflow is insufficient to blow the heat out the exhaust.">Hot Start</span>, which requires the pilot to instantly cut the fuel supply to save the engine from melting.</p>
            
        `,
        quiz: [
            { type: 'mcq', q: "What must happen BEFORE fuel and spark are introduced into a jet engine during startup?", options: ["The pilots must pray", "The engine must be forcefully spun up by pneumatic air to compress incoming oxygen", "The landing gear must be retracted", "The cabin must be depressurized"], answer: 1, exp: "The engine must be spinning rapidly to create a continuous flow of highly compressed air." },
            { type: 'fill-blank', q: "If jet fuel is introduced too early, massive flames will shoot forward out of the intake, causing a highly dangerous _________ Start.", answer: "hot", altAnswers: ["Hot", "hot", "hot start"], exp: "A Hot Start occurs when there isn't enough internal airflow to blow the explosive fire out the exhaust nozzle." },
            { type: 'match', q: "Order the highly choreographed Engine Start Sequence:", pairs: [ { left: "Step 1", right: "Pneumatic Bleed Air routed to starter" }, { left: "Step 2", right: "Engine core physically spun up" }, { left: "Step 3", right: "Igniters click and Fuel is sprayed" }, { left: "Step 4", right: "Light-off and self-sustaining combustion" } ], exp: "The sequence is meticulously timed by the computers to prevent melting the turbine." },
            { type: 'mcq', q: "Where does the pneumatic air used to start the main engines usually come from?", options: ["The tires", "The APU (Auxiliary Power Unit)", "Wind", "The fuel tanks"], answer: 1, exp: "The APU acts as a powerful air compressor to blow-start the main engines." },
            { type: 'fill-blank', q: "The automated computer that monitors and controls the engine start sequence is the _________ (Full Authority Digital Engine Control).", answer: "fadec", altAnswers: ["FADEC", "fadec"] , exp: "FADEC handles the complex timing of fuel and sparks." },
            { type: 'match', q: "Match the start anomaly to its description:", pairs: [ { left: "Hot Start", right: "Temperatures exceed limits, melting turbines" }, { left: "Hung Start", right: "Engine lights but fails to accelerate to idle speed" }, { left: "Wet Start", right: "Fuel pools without igniting" } ], exp: "FADEC will automatically abort the start if it detects any of these." },
            { type: 'mcq', q: "What is a 'cross-bleed' start?", options: ["Bleeding fuel across the wings", "Using the pressurized bleed air from an already running Engine 1 to start Engine 2", "Starting the engine in reverse", "Bleeding hydraulic fluid"], answer: 1, exp: "If the APU is broken, one running engine can blow-start the other." },
            { type: 'fill-blank', q: "Once the engine reaches self-sustaining speed, the pneumatic _________ valve snaps shut.", answer: "starter", altAnswers: ["Starter", "starter"] , exp: "The starter motor disengages, much like letting go of the key in a car." },
            { type: 'mcq', q: "Why do pilots monitor EGT (Exhaust Gas Temperature) so closely during startup?", options: ["To keep the cabin warm", "Because if it rises too fast, it indicates a Hot Start that will destroy the engine", "To measure thrust", "To check fuel pressure"], answer: 1, exp: "EGT is the primary indicator of engine health during light-off." },
            { type: 'mcq', q: "What produces the loud 'clicking' sound during engine start?", options: ["The fan blades hitting the casing", "The high-voltage Igniters firing massive sparks", "The hydraulic pumps", "The passengers' seatbelts"], answer: 1, exp: "The igniters fire rapidly until combustion is stable." }
        ]
    }
);

</script>
    <script>
document.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons();
    
    const sidebar = document.getElementById("sidebar");
    const navMenu = document.getElementById("nav-menu");
    const contentArea = document.getElementById("content-area");
    const mobileMenuBtn = document.getElementById("mobile-menu-btn");
    
    // Mobile menu toggle
    mobileMenuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("open");
    });
    
    // Close sidebar when clicking outside on mobile
    document.addEventListener("click", (e) => {
        if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
            sidebar.classList.remove("open");
        }
    });

    let currentSectionId = courseData[0].id;
    
    // Initialize Navigation
    function initNav() {
        navMenu.innerHTML = '';
        courseData.forEach(section => {
            const btn = document.createElement("button");
            btn.className = `nav-item ${section.id === currentSectionId ? 'active' : ''}`;
            btn.textContent = section.title;
            btn.onclick = () => loadSection(section.id);
            navMenu.appendChild(btn);
        });
    }

    // Load a specific section
    window.loadSection = function(id) {
        currentSectionId = id;
        initNav(); // Update active state
        
        if (window.innerWidth <= 768) {
            sidebar.classList.remove("open");
        }
        
        const section = courseData.find(s => s.id === id);
        renderSection(section);
    }

    function renderSection(section) {
        const leftoverPlanes = document.getElementById('perfect-score-wrapper');
        if (leftoverPlanes) leftoverPlanes.remove();
        document.querySelectorAll('svg.flying-plane').forEach(el => el.remove());

        contentArea.innerHTML = '';
        if (window.animManager) window.animManager.stop();
        
        if (section.animationType) {
            const animHtml = `
                <div class="animation-container">
                    <canvas id="sim-canvas" width="800" height="400"></canvas>
                    <div id="sim-controls" class="sim-controls"></div>
                </div>
            `;
            contentArea.innerHTML += animHtml;
            setTimeout(() => {
                if(!window.animManager) window.animManager = new AnimationManager();
                window.animManager.start(section.animationType);
            }, 50);
        } else if (section.hasVideo) {
            const videoHtml = `
                <div class="video-container" onclick="playVideoSimulation()">
                    <img src="assets/${section.videoPlaceholder}" alt="Video placeholder for ${section.title}" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1200&q=80'">
                    <div class="play-button"><i data-lucide="play" style="width: 36px; height: 36px;"></i></div>
                    <div class="video-overlay">Animated Physics: ${section.title}</div>
                </div>
            `;
            contentArea.innerHTML += videoHtml;
        }

        // Tabs
        if (section.quiz && section.quiz.length > 0) {
            const tabsHtml = `
                <div class="tabs-container">
                    <div class="tabs-header">
                        <button class="tab-btn active" onclick="switchTab('text')"><i data-lucide="file-text"></i> Textual Content</button>
                        <button class="tab-btn" onclick="switchTab('quiz')"><i data-lucide="check-square"></i> Knowledge Check</button>
                    </div>
                    <div id="tab-text" class="tab-content active textual-content">
                        ${section.textContent}
                    </div>
                    <div id="tab-quiz" class="tab-content">
                        <div id="quiz-container" class="quiz-container"></div>
                    </div>
                </div>
            `;
            contentArea.innerHTML += tabsHtml;
            initQuiz(section.quiz);
        } else {
            // Just text if no quiz
            const textHtml = `
                <div class="tabs-container">
                    <div id="tab-text" class="tab-content active textual-content">
                        ${section.textContent}
                    </div>
                </div>
            `;
            contentArea.innerHTML += textHtml;
        }

        lucide.createIcons();
        initTooltips();
        
        // Scroll to top
        document.getElementById('main-content').scrollTop = 0;
    }

    // Tab Switching
    window.switchTab = function(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        const activeBtn = event.currentTarget;
        activeBtn.classList.add('active');
        document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    // Video Simulation
    window.playVideoSimulation = function() {
        alert("This is an animated video placeholder showcasing the physics of this section.");
    }

    // Quiz Logic
    function initQuiz(questions) {
        const container = document.getElementById('quiz-container');
        if (!container) return;
        
        container.innerHTML = '';
        window.currentQuizData = questions;
        
        questions.forEach((q, index) => {
            let questionContent = '';
            
            if (!q.type || q.type === 'mcq') {
                questionContent = `
                    <div class="options-grid" id="options-${index}">
                        ${q.options.map((opt, i) => `
                            <button class="option-btn" onclick="selectOption(${index}, ${i}, ${q.answer}, '${q.exp.replace(/'/g, "\\' ")}')">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                `;
            } else if (q.type === 'fill-blank') {
                questionContent = `
                    <div class="fill-blank-container" id="fill-blank-${index}">
                        <input type="text" class="quiz-blank-input" id="input-${index}" placeholder="Type your answer here..." autocomplete="off" />
                        <button class="check-btn" onclick="checkFillBlank(${index})">Check Answer</button>
                    </div>
                `;
            } else if (q.type === 'match') {
                const rights = [...q.pairs.map(p => p.right)].sort(() => Math.random() - 0.5);
                questionContent = `
                    <div class="match-container" id="match-${index}">
                        ${q.pairs.map((p, i) => `
                            <div class="match-row">
                                <div class="match-left">${p.left}</div>
                                <select class="match-select" id="match-select-${index}-${i}">
                                    <option value="">Select match...</option>
                                    ${rights.map(r => `<option value="${r}">${r}</option>`).join('')}
                                </select>
                            </div>
                        `).join('')}
                        <button class="check-btn" style="margin-top: 1rem;" onclick="checkMatch(${index})">Check Matches</button>
                    </div>
                `;
            }

            const questionHtml = `
                <div class="question-block" id="q-block-${index}">
                    <div class="question-text">${index + 1}. ${q.q}</div>
                    ${questionContent}
                    <div class="explanation-box" id="exp-${index}">
                        <h4>Explanation</h4>
                        <p>${q.exp}</p>
                    </div>
                </div>
            `;
            container.innerHTML += questionHtml;
        });
        
        container.innerHTML += `
            <div id="quiz-results" class="quiz-results">
                <h2 id="result-title">Quiz Complete!</h2>
                <p class="final-score">Score: <span id="score-display">0</span> / ${questions.length}</p>
                <h3 id="advice-display"></h3>
            </div>
        `;
        
        window.currentQuizState = {
            total: questions.length,
            answered: 0,
            score: 0
        };
    }

    function triggerPerfectScoreAnimation() {
        const wrapper = document.createElement('div');
        wrapper.id = 'perfect-score-wrapper';
        document.body.appendChild(wrapper);

        for (let i = 0; i < 15; i++) {
            const plane = document.createElement('i');
            plane.setAttribute('data-lucide', 'plane');
            plane.className = 'flying-plane';
            
            const leftPos = Math.random() * 100;
            const delay = Math.random() * 1.5;
            const duration = 1.5 + Math.random() * 2;
            
            plane.style.left = `${leftPos}vw`;
            plane.style.animationDelay = `${delay}s`;
            plane.style.animationDuration = `${duration}s`;
            
            wrapper.appendChild(plane);
        }
        lucide.createIcons();

        setTimeout(() => {
            wrapper.remove();
        }, 5000);
    }

    function checkQuizComplete() {
        window.currentQuizState.answered++;
        if (window.currentQuizState.answered === window.currentQuizState.total) {
            const results = document.getElementById('quiz-results');
            const score = window.currentQuizState.score;
            const total = window.currentQuizState.total;
            const percentage = score / total;
            
            document.getElementById('score-display').textContent = score;
            const advice = document.getElementById('advice-display');
            const title = document.getElementById('result-title');
            
            if (percentage === 1) {
                advice.textContent = "PERFECT SCORE! You're a certified Aviation Expert! 🏆";
                advice.style.color = 'var(--accent)';
                title.textContent = "Outstanding!";
                results.classList.add('perfect-glow');
                triggerPerfectScoreAnimation();
            } else if (percentage >= 0.8) {
                advice.textContent = "Excellent work! You have a solid grasp of aeronautical concepts.";
                advice.style.color = 'var(--text-light)';
            } else if (percentage >= 0.5) {
                advice.textContent = "Good effort! You're getting the hang of it, but there's room for improvement.";
                advice.style.color = '#ffb86c';
            } else {
                advice.textContent = "Keep studying! Review the highlighted physics terms above and try again.";
                advice.style.color = 'var(--incorrect)';
            }
            
            results.style.display = 'block';
            
            setTimeout(() => {
                const mainContent = document.getElementById('main-content');
                if (mainContent) {
                    mainContent.scrollTo({
                        top: mainContent.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, 300);
        }
    }

    window.selectOption = function(qIndex, selectedOptionIndex, correctOptionIndex, explanation) {
        const optionsGrid = document.getElementById(`options-${qIndex}`);
        const buttons = optionsGrid.querySelectorAll('.option-btn');
        if (buttons[0].disabled) return;
        
        buttons.forEach(btn => btn.disabled = true);
        buttons[selectedOptionIndex].classList.add('selected');
        
        if (selectedOptionIndex === correctOptionIndex) {
            buttons[selectedOptionIndex].classList.add('correct');
            window.currentQuizState.score++;
        } else {
            buttons[selectedOptionIndex].classList.add('wrong');
            buttons[correctOptionIndex].classList.add('correct');
        }
        
        document.getElementById(`exp-${qIndex}`).classList.add('show');
        checkQuizComplete();
    }

    window.checkFillBlank = function(qIndex) {
        const input = document.getElementById(`input-${qIndex}`);
        const btn = document.querySelector(`#fill-blank-${qIndex} .check-btn`);
        if (input.disabled) return;
        
        const qData = window.currentQuizData[qIndex];
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = qData.answer.toLowerCase();
        
        input.disabled = true;
        btn.disabled = true;
        
        if (userAnswer === correctAnswer || (qData.altAnswers && qData.altAnswers.some(a => a.toLowerCase() === userAnswer))) {
            input.classList.add('correct');
            window.currentQuizState.score++;
        } else {
            input.classList.add('wrong');
            input.value = `${input.value} (Correct: ${qData.answer})`;
        }
        
        document.getElementById(`exp-${qIndex}`).classList.add('show');
        checkQuizComplete();
    }

    window.checkMatch = function(qIndex) {
        const container = document.getElementById(`match-${qIndex}`);
        const btn = container.querySelector('.check-btn');
        if (btn.disabled) return;
        
        const qData = window.currentQuizData[qIndex];
        let allCorrect = true;
        
        qData.pairs.forEach((p, i) => {
            const select = document.getElementById(`match-select-${qIndex}-${i}`);
            select.disabled = true;
            if (select.value === p.right) {
                select.classList.add('correct');
            } else {
                select.classList.add('wrong');
                allCorrect = false;
                // Add a small span showing correct answer
                const corrSpan = document.createElement('span');
                corrSpan.style.color = 'var(--correct)';
                corrSpan.style.marginLeft = '10px';
                corrSpan.style.fontSize = '0.8rem';
                corrSpan.innerText = `(Correct: ${p.right})`;
                select.parentNode.appendChild(corrSpan);
            }
        });
        
        btn.disabled = true;
        
        if (allCorrect) {
            window.currentQuizState.score++;
        }
        
        document.getElementById(`exp-${qIndex}`).classList.add('show');
        checkQuizComplete();
    }

    // Tooltip Logic
    const tooltip = document.getElementById('physics-tooltip');
    const tooltipTitle = document.getElementById('tooltip-title');
    const tooltipDesc = document.getElementById('tooltip-desc');

    function initTooltips() {
        const terms = document.querySelectorAll('.physics-term');
        
        terms.forEach(term => {
            term.addEventListener('mouseenter', (e) => {
                const rect = e.target.getBoundingClientRect();
                const text = e.target.textContent;
                const def = e.target.getAttribute('data-definition');
                
                tooltipTitle.textContent = text;
                tooltipDesc.textContent = def;
                
                tooltip.style.left = `${rect.left}px`;
                tooltip.style.top = `${rect.bottom + window.scrollY + 10}px`;
                tooltip.classList.remove('hidden');
            });
            
            term.addEventListener('mouseleave', () => {
                tooltip.classList.add('hidden');
            });
        });
    }

    // Initialize the app
    initNav();
    loadSection(currentSectionId);
});

// --- KEYCHAIN SCROLL ENGINE ---
class KeychainScrollEngine {
    constructor(contentId, trackId, thumbId) {
        this.content = document.getElementById(contentId);
        this.track = document.getElementById(trackId);
        this.keychain = document.getElementById(thumbId);
        
        if (!this.content || !this.keychain) return;

        this.lastScrollY = this.content.scrollTop;
        this.velocity = 0;
        this.swingAngle = 0;
        
        this.isDragging = false;
        this.startY = 0;
        this.startScroll = 0;

        this.initEvents();
        this.renderLoop = this.renderLoop.bind(this);
        requestAnimationFrame(this.renderLoop);
    }

    initEvents() {
        // Dragging Logic
        this.keychain.addEventListener('mousedown', (e) => {
            this.isDragging = true;
            this.startY = e.clientY;
            this.startScroll = this.content.scrollTop;
            document.body.style.userSelect = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!this.isDragging) return;
            const deltaY = e.clientY - this.startY;
            
            // Calculate ratio
            const scrollableHeight = this.content.scrollHeight - this.content.clientHeight;
            const trackHeight = this.track.clientHeight - 150; // 150 is keychain height
            
            if (trackHeight <= 0) return;
            
            const scrollRatio = scrollableHeight / trackHeight;
            this.content.scrollTop = this.startScroll + (deltaY * scrollRatio);
        });

        window.addEventListener('mouseup', () => {
            this.isDragging = false;
            document.body.style.userSelect = '';
        });
    }

    renderLoop() {
        if (!this.content || !this.keychain) return;

        const currentScroll = this.content.scrollTop;
        const scrollableHeight = this.content.scrollHeight - this.content.clientHeight;
        const trackHeight = this.track.clientHeight - 150;
        
        // Hide keychain if nothing to scroll
        if (scrollableHeight <= 0) {
            this.track.style.display = 'none';
            return requestAnimationFrame(this.renderLoop);
        } else {
            this.track.style.display = 'block';
        }

        // Toggle Scroll to Top Button (only for main content)
        if (this.content.id === 'main-content') {
            const scrollBtn = document.getElementById('scroll-to-top-btn');
            if (scrollBtn) {
                if (currentScroll > 300) {
                    scrollBtn.classList.add('visible');
                } else {
                    scrollBtn.classList.remove('visible');
                }
            }
        }

        // Calculate Y position
        const percentage = currentScroll / scrollableHeight;
        const yPos = percentage * trackHeight;
        
        // Calculate Velocity for Swinging Physics
        this.velocity = currentScroll - this.lastScrollY;
        this.lastScrollY = currentScroll;
        
        // Apply physics (damped pendulum)
        let targetAngle = this.velocity * -0.5; // swing opposite to movement
        // Limit max swing
        if (targetAngle > 45) targetAngle = 45;
        if (targetAngle < -45) targetAngle = -45;
        
        // Smoothly approach target angle
        this.swingAngle += (targetAngle - this.swingAngle) * 0.1;
        // Damping when stationary
        if (Math.abs(this.velocity) < 1) {
            this.swingAngle *= 0.9; 
        }

        this.keychain.style.transform = `translateY(${yPos}px) rotate(${this.swingAngle}deg)`;

        requestAnimationFrame(this.renderLoop);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        window.scrollEngineMain = new KeychainScrollEngine('main-content', 'custom-scrollbar-track', 'custom-keychain');
        window.scrollEngineSidebar = new KeychainScrollEngine('sidebar', 'sidebar-scrollbar-track', 'sidebar-keychain');
    }, 100);
});

// --- ANIMATION MANAGER ---
class AnimationManager {
    constructor() {
        this.canvas = null;
        this.ctx = null;
        this.reqId = null;
        this.type = null;
        this.particles = [];
        this.state = {};
    }

    stop() {
        if(this.reqId) cancelAnimationFrame(this.reqId);
        this.reqId = null;
        this.type = null;
        this.particles = [];
        this.state = {};
    }

    start(type) {
        this.stop();
        this.canvas = document.getElementById('sim-canvas');
        if(!this.canvas) return;
        this.ctx = this.canvas.getContext('2d');
        this.type = type;
        
        const controls = document.getElementById('sim-controls');
        controls.innerHTML = '';

        if(type === 'windtunnel') {
            this.state.aoa = 5;
            controls.innerHTML = `<label>Angle of Attack: <input type="range" id="aoa-slider" min="-5" max="25" value="5"></label>`;
            document.getElementById('aoa-slider').oninput = (e) => this.state.aoa = parseInt(e.target.value);
            for(let i=0; i<150; i++) this.particles.push(this.createParticle());
        } 
        else if (type === 'engine') {
            this.state.throttle = 50;
            this.state.angle = 0;
            controls.innerHTML = `<label>Throttle: <input type="range" id="thr-slider" min="0" max="100" value="50"></label>`;
            document.getElementById('thr-slider').oninput = (e) => this.state.throttle = parseInt(e.target.value);
        }
        else if (type === 'blueprint') {
            this.state.time = 0;
        }

        this.loop = this.loop.bind(this);
        this.reqId = requestAnimationFrame(this.loop);
    }

    createParticle() {
        return {
            x: Math.random() * 800,
            y: Math.random() * 400,
            speed: 5 + Math.random() * 3
        };
    }

    loop() {
        if(!this.ctx) return;
        this.ctx.clearRect(0, 0, 800, 400);

        if(this.type === 'windtunnel') this.drawWindTunnel();
        else if (this.type === 'engine') this.drawEngine();
        else if (this.type === 'blueprint') this.drawBlueprint();

        this.reqId = requestAnimationFrame(this.loop);
    }

    drawWindTunnel() {
        const ctx = this.ctx;
        const aoa = this.state.aoa * Math.PI / 180;
        
        ctx.fillStyle = 'rgba(100, 255, 218, 0.6)';
        this.particles.forEach(p => {
            let vx = p.speed;
            let vy = 0;
            
            if(p.x > 300 && p.x < 500 && p.y > 150 && p.y < 250) {
                if(p.y < 200) vy = -2;
                else vy = 2 + (this.state.aoa * 0.1);
            }

            p.x += vx;
            p.y += vy;
            if(p.x > 800) { p.x = -10; p.y = Math.random() * 400; }
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
            ctx.fill();
        });

        ctx.save();
        ctx.translate(400, 200);
        ctx.rotate(-aoa);
        
        ctx.beginPath();
        ctx.moveTo(-100, 0);
        ctx.quadraticCurveTo(-50, -40, 0, -30);
        ctx.quadraticCurveTo(50, -20, 100, 0);
        ctx.quadraticCurveTo(50, 10, 0, 10);
        ctx.quadraticCurveTo(-50, 10, -100, 0);
        
        ctx.fillStyle = '#ccd6f6';
        ctx.fill();
        ctx.strokeStyle = '#8892b0';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
        
        let liftForce = Math.max(0, this.state.aoa * 2.5 + 20);
        if(this.state.aoa > 15) liftForce = Math.max(0, liftForce - (this.state.aoa-15)*5);
        ctx.strokeStyle = '#64ffda';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(400, 200);
        ctx.lineTo(400, 200 - liftForce);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(400, 200 - liftForce);
        ctx.lineTo(390, 200 - liftForce + 15);
        ctx.lineTo(410, 200 - liftForce + 15);
        ctx.fillStyle = '#64ffda';
        ctx.fill();
        
        ctx.fillStyle = '#fff';
        ctx.font = '16px monospace';
        ctx.fillText(this.state.aoa > 15 ? 'STALLING!' : 'LIFT FORCE', 420, 200 - liftForce/2);
    }

    drawEngine() {
        const ctx = this.ctx;
        this.state.angle += (this.state.throttle / 100) * 0.5;
        
        ctx.fillStyle = '#112240';
        ctx.fillRect(200, 100, 400, 200);
        ctx.strokeStyle = '#8892b0';
        ctx.lineWidth = 5;
        ctx.strokeRect(200, 100, 400, 200);
        
        let glow = this.state.throttle / 100;
        let grad = ctx.createLinearGradient(600, 200, 800, 200);
        grad.addColorStop(0, `rgba(255, 100, 0, ${glow})`);
        grad.addColorStop(1, 'rgba(255, 0, 0, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(600, 120, 200, 160);
        
        ctx.save();
        ctx.translate(300, 200);
        ctx.rotate(this.state.angle);
        ctx.fillStyle = '#ccd6f6';
        for(let i=0; i<12; i++) {
            ctx.rotate((Math.PI * 2) / 12);
            ctx.beginPath();
            ctx.ellipse(0, 40, 10, 40, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(0, 0, 20, 0, Math.PI*2);
        ctx.fillStyle = '#64ffda';
        ctx.fill();
        ctx.restore();
        
        ctx.fillStyle = '#fff';
        ctx.font = '20px monospace';
        ctx.fillText('N1: ' + Math.floor(this.state.throttle * 1.5) + '%', 350, 50);
    }
    
    drawBlueprint() {
        const ctx = this.ctx;
        this.state.time += 0.05;
        
        ctx.strokeStyle = 'rgba(100, 255, 218, 0.1)';
        ctx.lineWidth = 1;
        for(let i=0; i<800; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke(); }
        for(let i=0; i<400; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }
        
        ctx.strokeStyle = '#64ffda';
        ctx.lineWidth = 3;
        ctx.fillStyle = 'rgba(10, 25, 47, 0.8)';
        
        ctx.beginPath();
        ctx.ellipse(400, 200, 250, 40, 0, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(350, 160);
        ctx.lineTo(250, 50);
        ctx.lineTo(300, 50);
        ctx.lineTo(450, 160);
        ctx.fill(); ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(350, 240);
        ctx.lineTo(250, 350);
        ctx.lineTo(300, 350);
        ctx.lineTo(450, 240);
        ctx.fill(); ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(600, 180);
        ctx.lineTo(650, 100);
        ctx.lineTo(670, 100);
        ctx.lineTo(650, 180);
        ctx.fill(); ctx.stroke();
        
        let scanY = 200 + Math.sin(this.state.time) * 150;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(100, scanY);
        ctx.lineTo(700, scanY);
        ctx.stroke();
        
        ctx.fillStyle = '#fff';
        ctx.font = '16px monospace';
        ctx.fillText('SYSTEM ANALYSIS ACTIVE', 50, 30);
    }
}

// Home Page Transition
window.enterCourse = function() {
    const homePage = document.getElementById('home-page');
    const app = document.getElementById('app');
    
    homePage.classList.add('taking-off');
    
    setTimeout(() => {
        homePage.style.display = 'none';
        app.style.display = 'flex';
        app.style.animation = 'fadeInUp 0.8s ease-out';

    }, 1800);
}

window.returnToHome = function() {
    const homePage = document.getElementById('home-page');
    const app = document.getElementById('app');
    
    app.style.display = 'none';
    
    // Reset home page animation
    homePage.classList.remove('taking-off');
    homePage.style.display = 'flex';
    homePage.style.opacity = '1';
    
    // Re-initialize icons just in case
    lucide.createIcons();
}
