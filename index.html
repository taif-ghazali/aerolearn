const COLORS = {c1:'',c2:'c2',c3:'c3',c4:'c4'};
const sidebar = document.getElementById('parts-sidebar');
Object.entries(PARTS).forEach(([key,d])=>{
  const div=document.createElement('div');
  div.className='part-item'; div.id='pi-'+key;
  div.onclick=()=>showInfo(key);
  div.innerHTML=`<div class="pdot ${COLORS[d.color]||''}"></div><span class="pname">${d.title}</span>`;
  sidebar.appendChild(div);
});

/* ═══════════════════════════════════════════════════
   SHOW INFO
═══════════════════════════════════════════════════ */
let currentPart=null, currentTab='overview';

function showInfo(key){
  const d=PARTS[key]; if(!d)return;
  currentPart=key;

  document.getElementById('ph-tag').textContent=d.label;
  const pt=document.getElementById('ph-title');
  pt.textContent=d.title;
  pt.className='ph-title '+(d.color==='c2'?'c2':d.color==='c3'?'c3':d.color==='c4'?'c4':'');

  // Fill tabs
  ['overview','physics','math','calc'].forEach(t=>{
    document.getElementById('tab-'+t).innerHTML = d.tabs[t]||'<p class="eng" style="padding:14px 20px">Content coming soon.</p>';
  });

  switchTab('overview');
  document.getElementById('info-panel').classList.add('visible');
  document.getElementById('drag-hint').style.opacity='0';

  // Sidebar highlight
  document.querySelectorAll('.part-item').forEach(el=>el.classList.remove('active'));
  const pi=document.getElementById('pi-'+key);
  if(pi)pi.classList.add('active');

  // Progress bar
  const keys=Object.keys(PARTS);
  const pct=Math.round((keys.indexOf(key)+1)/keys.length*100);
  document.getElementById('bot-fill').style.width=pct+'%';

  // Typeset MathJax
  if(window.MathJax) MathJax.typesetPromise([document.getElementById('info-panel')]);
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  // find button
  const btns=document.querySelectorAll('.tab-btn');
  const tabs=['overview','physics','math','calc'];
  btns[tabs.indexOf(tab)].classList.add('active');
  if(window.MathJax) MathJax.typesetPromise([document.getElementById('tab-'+tab)]);
}

function closePanel(){
  document.getElementById('info-panel').classList.remove('visible');
  document.querySelectorAll('.part-item').forEach(el=>el.classList.remove('active'));
}

// Hotspots
document.querySelectorAll('.hotspot').forEach(hs=>{
  hs.addEventListener('click',e=>{e.stopPropagation();showInfo(hs.dataset.part);});
  hs.addEventListener('mouseenter',()=>{const t=document.getElementById('tooltip');t.textContent=hs.title;t.style.opacity='1';});
  hs.addEventListener('mouseleave',()=>{document.getElementById('tooltip').style.opacity='0';});
  hs.addEventListener('mousemove',e=>{const t=document.getElementById('tooltip');t.style.left=e.clientX+14+'px';t.style.top=e.clientY-8+'px';});
});

document.addEventListener('click',e=>{
  if(!e.target.closest('#info-panel')&&!e.target.closest('.hotspot')&&!e.target.closest('#parts-sidebar')&&!e.target.closest('.header'))closePanel();
});

/* ═══════════════════════════════════════════════════
   MODES
═══════════════════════════════════════════════════ */
function setMode(m){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  if(m==='derive'){ showInfo('wing'); switchTab('math'); }
  else if(m==='calc'){ showInfo('engine'); switchTab('calc'); }
}

/* ═══════════════════════════════════════════════════
   CALCULATORS
═══════════════════════════════════════════════════ */
function altPress(ft){ return 101325*Math.pow(1-0.0000225577*ft*0.3048,5.25588); }
function altDens(ft){ return 1.225*Math.pow(1-0.0000225577*ft*0.3048,4.25588); }
function altTemp(ft){ return 288.15-0.0065*ft*0.3048; }

function calcNose(){
  const M=parseFloat(document.getElementById('c-mach').value);
  const alt=parseFloat(document.getElementById('c-alt').value);
  const g=1.4;
  const p=altPress(alt);
  const T=altTemp(alt);
  const a=Math.sqrt(g*287*T);
  const TAS=M*a;
  const p0=p*Math.pow(1+(g-1)/2*M*M,g/(g-1));
  const q=p0-p;
  const Cp=2/(g*M*M)*(Math.pow(1+(g-1)/2*M*M,g/(g-1))-1);
  const dT=T*(g-1)/2*M*M;
  document.getElementById('nose-result').innerHTML=
    `p∞ = ${p.toFixed(0)} Pa | p₀ = ${p0.toFixed(0)} Pa | q = ${q.toFixed(0)} Pa<br>`+
    `TAS = ${(TAS*1.944).toFixed(1)} kt | Cp,stag = ${Cp.toFixed(3)} | ΔT = +${dT.toFixed(1)} K`;
}

function calcCockpit(){
  const IAS=parseFloat(document.getElementById('cc-ias').value)*0.5144;
  const alt=parseFloat(document.getElementById('cc-alt').value);
  const oat=parseFloat(document.getElementById('cc-oat').value)+273.15;
  const rho=altDens(alt), rhoSL=1.225;
  const TAS=IAS*Math.sqrt(rhoSL/rho);
  const a=Math.sqrt(1.4*287*oat);
  const M=TAS/a;
  document.getElementById('cockpit-result').innerHTML=
    `TAS = ${(TAS/0.5144).toFixed(1)} kt (${TAS.toFixed(1)} m/s)<br>`+
    `Mach = ${M.toFixed(4)} | ρ = ${rho.toFixed(4)} kg/m³`;
}

function calcFuselage(){
  const hCabin=parseFloat(document.getElementById('fc-cabin').value);
  const hFlight=parseFloat(document.getElementById('fc-flight').value);
  const r=parseFloat(document.getElementById('fc-r').value);
  const t=parseFloat(document.getElementById('fc-t').value)/1000;
  const pCabin=altPress(hCabin), pFlight=altPress(hFlight);
  const dP=pCabin-pFlight;
  const hoop=dP*r/t/1e6;
  const long=dP*r/(2*t)/1e6;
  const yield345=345;
  const vm=Math.sqrt(hoop*hoop-hoop*long+long*long);
  const SF=(yield345/hoop).toFixed(1);
  document.getElementById('fuse-result').innerHTML=
    `ΔP = ${(dP/1000).toFixed(2)} kPa (${(dP/6894.76).toFixed(2)} PSI)<br>`+
    `Hoop σθ = ${hoop.toFixed(1)} MPa | Long σL = ${long.toFixed(1)} MPa<br>`+
    `Von Mises = ${vm.toFixed(1)} MPa | Safety Factor = ${SF}×`;
}

function calcWindows(){
  const s0=parseFloat(document.getElementById('wc-s').value);
  const a=parseFloat(document.getElementById('wc-a').value);
  const b=parseFloat(document.getElementById('wc-b').value);
  const Kt=1+2*a/b;
  const peak=Kt*s0;
  document.getElementById('win-result').innerHTML=
    `Kt = ${Kt.toFixed(3)} | Peak σ = ${peak.toFixed(1)} MPa<br>`+
    `Acrylic strength ~70 MPa → SF = ${(70/peak).toFixed(2)}×`;
}

function calcWing(){
  const W=parseFloat(document.getElementById('wg-w').value)*9.81;
  const V=parseFloat(document.getElementById('wg-v').value);
  const alt=parseFloat(document.getElementById('wg-a').value);
  const S=parseFloat(document.getElementById('wg-s').value);
  const AR=parseFloat(document.getElementById('wg-ar').value);
  const rho=altDens(alt);
  const q=0.5*rho*V*V;
  const CL=W/(q*S);
  const e=1.78*(1-0.045*Math.pow(AR,0.68))-0.64;
  const CDi=CL*CL/(Math.PI*e*AR);
  const Di=CDi*q*S;
  document.getElementById('wing-result').innerHTML=
    `q = ${q.toFixed(1)} Pa | CL = ${CL.toFixed(4)}<br>`+
    `Oswald e = ${e.toFixed(3)} | CDi = ${CDi.toFixed(5)}<br>`+
    `Induced Drag Di = ${(Di/1000).toFixed(2)} kN per wing`;
}

function calcWinglet(){
  const b=parseFloat(document.getElementById('wl-b').value);
  const h=parseFloat(document.getElementById('wl-h').value);
  const d=parseFloat(document.getElementById('wl-d').value)*Math.PI/180;
  const eta=parseFloat(document.getElementById('wl-e').value);
  const k=eta*Math.cos(d);
  const ratio=2*(h/b)*k*(2-(h/b)*k);
  const effSpan=b+2*h*eta;
  document.getElementById('wl-result').innerHTML=
    `Κ (efficiency×cant) = ${k.toFixed(4)}<br>`+
    `Oswald e improvement = ${(ratio*100).toFixed(2)}%<br>`+
    `CDi reduction ≈ ${(ratio*100).toFixed(2)}% | Effective span ≈ ${effSpan.toFixed(2)} m<br>`+
    `Approx. fuel saving ≈ ${(ratio*100*0.5).toFixed(2)}%`;
}

function calcEngine(){
  const rp=parseFloat(document.getElementById('ec-rp').value);
  const nc=parseFloat(document.getElementById('ec-nc').value);
  const nt=parseFloat(document.getElementById('ec-nt').value);
  const T1=parseFloat(document.getElementById('ec-t1').value);
  const T3=parseFloat(document.getElementById('ec-t3').value);
  const g=1.4, cp=1005;
  const idealEff=1-1/Math.pow(rp,(g-1)/g);
  const T2i=T1*Math.pow(rp,(g-1)/g);
  const T2r=T1+(T2i-T1)/nc;
  const T4i=T3/Math.pow(rp,(g-1)/g);
  const wNet=cp*(T3-T4i)*nt-cp*(T2r-T1);
  const qIn=cp*(T3-T2r);
  const realEff=wNet/qIn;
  document.getElementById('eng-result').innerHTML=
    `Ideal Brayton η = ${(idealEff*100).toFixed(1)}%<br>`+
    `T2 (real) = ${T2r.toFixed(1)} K | Net work = ${(wNet/1000).toFixed(1)} kJ/kg<br>`+
    `Real cycle η ≈ ${(realEff*100).toFixed(1)}% | qIn = ${(qIn/1000).toFixed(1)} kJ/kg`;
}

function calcAileron(){
  const W=parseFloat(document.getElementById('ac-w').value)*9.81;
  const S=parseFloat(document.getElementById('ac-s').value);
  const CLclean=parseFloat(document.getElementById('ac-cll').value);
  const CLflap=parseFloat(document.getElementById('ac-clf').value);
  const alt=parseFloat(document.getElementById('ac-a').value);
  const rho=altDens(alt);
  const Vs_clean=Math.sqrt(2*W/(rho*S*CLclean));
  const Vs_flap=Math.sqrt(2*W/(rho*S*CLflap));
  document.getElementById('ail-result').innerHTML=
    `Clean Stall = ${(Vs_clean/0.5144).toFixed(1)} kt (${Vs_clean.toFixed(1)} m/s)<br>`+
    `Flap Stall = ${(Vs_flap/0.5144).toFixed(1)} kt (${Vs_flap.toFixed(1)} m/s)<br>`+
    `ΔCLmax = +${(CLflap-CLclean).toFixed(2)} | Speed reduction = ${((1-Vs_flap/Vs_clean)*100).toFixed(1)}%`;
}

function calcTail(){
  const T=parseFloat(document.getElementById('tc-t').value)*1000;
  const y=parseFloat(document.getElementById('tc-y').value);
  const Sv=parseFloat(document.getElementById('tc-sv').value);
  const lv=parseFloat(document.getElementById('tc-lv').value);
  const V=parseFloat(document.getElementById('tc-v').value)*0.5144;
  const rho=1.225;
  const N_eng=T*y;
  const q=0.5*rho*V*V;
  const CNd=0.02; const dr=27*Math.PI/180;
  const N_rud=q*Sv*lv*CNd*dr;
  const margin=(N_rud/N_eng-1)*100;
  document.getElementById('tail-result').innerHTML=
    `Engine yaw moment = ${(N_eng/1000).toFixed(1)} kN·m<br>`+
    `Rudder moment (max δr=27°) = ${(N_rud/1000).toFixed(1)} kN·m<br>`+
    `Margin = ${margin.toFixed(1)}% ${margin>0?'✅ Sufficient':'❌ Insufficient'}`;
}

function calcHstab(){
  const cg=parseFloat(document.getElementById('hc-cg').value)/100;
  const ac=parseFloat(document.getElementById('hc-ac').value)/100;
  const Vt=parseFloat(document.getElementById('hc-vt').value);
  const de=parseFloat(document.getElementById('hc-de').value);
  const a1=2*Math.PI; const at=2*Math.PI*0.9;
  const NP_pct=(ac*a1+Vt*at*(1-de))/(a1+Vt*at*(1-de));
  const SM=(NP_pct-cg)*100;
  document.getElementById('hs-result').innerHTML=
    `Neutral Point ≈ ${(NP_pct*100).toFixed(1)}% MAC<br>`+
    `Static Margin = ${SM.toFixed(1)}% MAC<br>`+
    `Stability: ${SM>0?'✅ STABLE (restoring)':'⚠️ UNSTABLE (augmentation needed)'}`;
}

function calcGear(){
  const W=parseFloat(document.getElementById('gc-w').value);
  const Vs=parseFloat(document.getElementById('gc-vs').value);
  const s=parseFloat(document.getElementById('gc-st').value);
  const eta=parseFloat(document.getElementById('gc-e').value);
  const E=0.5*W*Vs*Vs;
  const Favg=E/(2*eta*s);
  const n=Favg*2/(W*9.81);
  document.getElementById('gear-result').innerHTML=
    `KE = ${(E/1000).toFixed(1)} kJ total<br>`+
    `Average strut force = ${(Favg/1000).toFixed(1)} kN per strut<br>`+
    `Touchdown load factor = ${n.toFixed(2)}g`;
}

function calcApu(){
  const S=parseFloat(document.getElementById('ap-s').value)*1000;
  const Vph=parseFloat(document.getElementById('ap-v').value);
  const pf=parseFloat(document.getElementById('ap-pf').value);
  const ff=parseFloat(document.getElementById('ap-ff').value);
  const I=S/(3*Vph);
  const P=S*pf/1000;
  const eff=P/(ff/3.6*43200/1000)*100;
  document.getElementById('apu-result').innerHTML=
    `Phase current Iph = ${I.toFixed(1)} A<br>`+
    `Real power P = ${P.toFixed(1)} kW | Reactive Q = ${(S/1000*Math.sqrt(1-pf*pf)).toFixed(1)} kVAR<br>`+
    `Electrical efficiency ≈ ${eff.toFixed(1)}% (fuel→elec)`;
}
