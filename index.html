<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'color:red; background:white; position:fixed; z-index:9999; top:0; left:0; width:100%; padding:20px; font-size:20px; border-bottom: 2px solid black; font-family: monospace;';
        errDiv.innerHTML = '<b>JS ERROR:</b> ' + message + '<br>Line: ' + lineno;
        document.body.appendChild(errDiv);
        return false;
    };
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Understanding the Airplane</title>
    <meta name="description" content="An interactive, beginner-friendly course to understand the physics and mechanics of airplanes.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-dark: #0a192f;
    --bg-darker: #020c1b;
    --bg-card: #112240;
    --text-main: #ccd6f6;
    --text-muted: #8892b0;
    --accent: #64ffda;
    --accent-hover: #52e0c4;
    --highlight: #ffb86c;
    --correct: #50fa7b;
    --incorrect: #ff5555;
    
    --font-heading: 'Outfit', sans-serif;
    --font-body: 'Inter', sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: var(--font-body);
    background-color: var(--bg-dark);
    color: var(--text-main);
    line-height: 1.6;
    font-size: 18px; /* Big and visible */
    overflow-x: hidden;
}

h1, h2, h3, h4 {
    font-family: var(--font-heading);
    color: #e6f1ff;
    margin-bottom: 1rem;
}

#app {
    display: flex;
    height: 100vh;
    overflow: hidden;
    background-color: var(--bg-dark); /* Solid background to cover sky */
    position: relative;
    z-index: 10;
}

/* Sidebar */
#sidebar {
    width: 300px;
    background-color: var(--bg-darker);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    transition: transform 0.3s ease;
}

.sidebar-header {
    padding: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    transition: background 0.3s ease;
}
.sidebar-header:hover {
    background: rgba(255, 255, 255, 0.05);
}

.sidebar-header .logo-icon {
    color: var(--accent);
    width: 32px;
    height: 32px;
}

.sidebar-header h1 {
    margin: 0;
    font-size: 1.5rem;
    letter-spacing: 1px;
}

#nav-menu {
    padding: 1.5rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.nav-item {
    background: transparent;
    border: none;
    color: var(--text-muted);
    text-align: left;
    padding: 0.8rem 2rem;
    font-size: 1rem;
    font-family: var(--font-heading);
    cursor: pointer;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
}

.nav-item:hover {
    color: var(--text-main);
    background-color: rgba(100, 255, 218, 0.05);
}

.nav-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background-color: rgba(100, 255, 218, 0.1);
    font-weight: 600;
}

/* Main Content */
#main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    scroll-behavior: smooth;
}

.mobile-header {
    display: none;
    padding: 1rem;
    background-color: var(--bg-darker);
    align-items: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.content-wrapper {
    max-width: 1000px;
    margin: 0 auto;
    padding: 3rem 2rem;
    width: 100%;
    animation: fadeIn 0.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Video Player Simulation */
.video-container {
    width: 100%;
    aspect-ratio: 16 / 9;
    background-color: #000;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    margin-bottom: 2rem;
    box-shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.7);
    cursor: pointer;
    border: 2px solid rgba(100, 255, 218, 0.2);
}

.video-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.7;
    transition: opacity 0.3s;
}

.video-container:hover img {
    opacity: 0.5;
}

.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    background-color: rgba(10, 25, 47, 0.8);
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--accent);
    transition: all 0.3s ease;
}

.video-container:hover .play-button {
    transform: translate(-50%, -50%) scale(1.1);
    background-color: var(--accent);
    color: var(--bg-dark);
}

.video-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 1rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    color: white;
    font-family: var(--font-heading);
    font-size: 1.2rem;
}

/* Tabs */
.tabs-container {
    margin-top: 2rem;
    background-color: var(--bg-card);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.7);
}

.tabs-header {
    display: flex;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    background-color: var(--bg-darker);
}

.tab-btn {
    flex: 1;
    padding: 1.2rem;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.1rem;
    font-family: var(--font-heading);
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
}

.tab-btn:hover {
    color: var(--text-main);
    background-color: rgba(255,255,255,0.02);
}

.tab-btn.active {
    color: var(--accent);
    background-color: var(--bg-card);
    border-bottom: 3px solid var(--accent);
    font-weight: 600;
}

.tab-content {
    padding: 2.5rem;
    display: none;
}

.tab-content.active {
    display: block;
    animation: fadeIn 0.4s ease-out;
}

/* Text Content Styles */
.textual-content h2 {
    color: var(--accent);
    font-size: 2.2rem;
    margin-bottom: 1.5rem;
}

.textual-content h3 {
    color: var(--text-main);
    margin-top: 2rem;
    font-size: 1.5rem;
}

.textual-content p {
    margin-bottom: 1.5rem;
}

.textual-content ul {
    margin-left: 2rem;
    margin-bottom: 1.5rem;
}

.textual-content li {
    margin-bottom: 0.5rem;
}

/* Physics Terms */
.physics-term {
    color: var(--highlight);
    font-weight: 600;
    cursor: pointer;
    border-bottom: 1px dashed var(--highlight);
    position: relative;
    padding: 0 2px;
    transition: all 0.2s;
}

.physics-term:hover {
    background-color: rgba(255, 184, 108, 0.1);
}

/* Tooltip */
.tooltip {
    position: absolute;
    background-color: var(--bg-card);
    border: 1px solid var(--highlight);
    padding: 1rem;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    max-width: 300px;
    z-index: 1000;
    opacity: 1;
    transition: opacity 0.2s;
}

.tooltip.hidden {
    opacity: 0;
    pointer-events: none;
}

.tooltip h4 {
    color: var(--highlight);
    margin-bottom: 0.5rem;
    font-size: 1.1rem;
}

.tooltip p {
    font-size: 0.9rem;
    margin: 0;
    line-height: 1.4;
}

/* Quiz Styles */
.quiz-container {
    max-width: 800px;
    margin: 0 auto;
}

.question-block {
    margin-bottom: 2.5rem;
    padding: 2rem;
    background-color: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.question-text {
    font-size: 1.3rem;
    font-family: var(--font-heading);
    margin-bottom: 1.5rem;
    color: #fff;
}

.options-grid {
    display: grid;
    gap: 1rem;
}

.option-btn {
    background-color: var(--bg-darker);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-main);
    padding: 1rem 1.5rem;
    border-radius: 8px;
    text-align: left;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 1rem;
}

.option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background-color: rgba(100, 255, 218, 0.05);
}

.option-btn.selected {
    border-color: var(--accent);
    background-color: rgba(100, 255, 218, 0.1);
}

.option-btn.correct {
    border-color: var(--correct);
    background-color: rgba(80, 250, 123, 0.1);
    color: var(--correct);
}

.option-btn.wrong {
    border-color: var(--incorrect);
    background-color: rgba(255, 85, 85, 0.1);
    color: var(--incorrect);
}

.explanation-box {
    margin-top: 1.5rem;
    padding: 1rem;
    border-radius: 8px;
    background-color: rgba(100, 255, 218, 0.05);
    border-left: 4px solid var(--accent);
    display: none;
    animation: fadeIn 0.3s ease-out;
}

.explanation-box.show {
    display: block;
}

.explanation-box h4 {
    color: var(--accent);
    font-size: 1rem;
    margin-bottom: 0.5rem;
}

.quiz-results {
    text-align: center;
    padding: 3rem;
    background-color: var(--bg-card);
    border-radius: 12px;
    margin-top: 2rem;
    display: none;
}

.quiz-results h2 {
    color: var(--accent);
    font-size: 2.5rem;
}

.quiz-results p {
    font-size: 1.5rem;
    margin-bottom: 2rem;
}

.restart-btn {
    background-color: var(--accent);
    color: var(--bg-dark);
    border: none;
    padding: 1rem 2rem;
    font-size: 1.2rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s;
    font-family: var(--font-heading);
}

.restart-btn:hover {
    background-color: var(--accent-hover);
}

/* Responsive */
@media (max-width: 768px) {
    #app {
        flex-direction: column;
    }
    
    #sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        height: 100vh;
        z-index: 2000;
    }
    
    #sidebar.open {
        left: 0;
        box-shadow: 20px 0 50px rgba(0,0,0,0.5);
    }
    
    .mobile-header {
        display: flex;
    }
    
    .mobile-header h2 {
        margin: 0;
        margin-left: 1rem;
        color: var(--accent);
    }
    
    #mobile-menu-btn {
        background: none;
        border: none;
        color: var(--text-main);
        cursor: pointer;
    }
}

.animation-container {
    width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(100, 255, 218, 0.2);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin-bottom: 2rem;
}
#sim-canvas {
    width: 100%;
    height: 400px;
    display: block;
}
.sim-controls {
    background: rgba(10, 25, 47, 0.9);
    padding: 15px 20px;
    border-top: 1px solid rgba(100, 255, 218, 0.2);
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
}
.sim-controls label {
    color: var(--text-light);
    font-weight: 500;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
}
.sim-controls input[type="range"] {
    accent-color: var(--accent);
    cursor: pointer;
}

.home-page {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10000;
}
.home-content {
    text-align: center;
    animation: fadeInUp 1s ease-out;
}
.home-logo {
    width: 80px; height: 80px;
    color: var(--accent);
    margin-bottom: 1rem;
    animation: float 3s ease-in-out infinite;
}
.home-title {
    font-size: 5rem;
    font-weight: 800;
    color: var(--text-light);
    margin-bottom: 0.5rem;
    letter-spacing: -2px;
}
.home-subtitle {
    font-size: 1.2rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}
.home-features {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 3rem;
    flex-wrap: wrap;
    justify-content: center;
}
.feature-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(100, 255, 218, 0.2);
    padding: 0.8rem 1.5rem;
    border-radius: 50px;
    color: var(--text-light);
    font-weight: 500;
    font-size: 1rem;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}
.feature-badge i {
    color: var(--accent);
    width: 20px;
    height: 20px;
}
.feature-badge:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    box-shadow: 0 8px 25px rgba(100, 255, 218, 0.2);
    background: rgba(100, 255, 218, 0.05);
}
.start-btn {
    background: var(--accent);
    color: var(--bg-dark);
    border: none;
    padding: 1rem 3rem;
    font-size: 1.2rem;
    font-weight: 600;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 20px rgba(100, 255, 218, 0.3);
}
.start-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 15px 25px rgba(100, 255, 218, 0.4);
}
.home-footer {
    position: absolute;
    bottom: 2rem;
    color: var(--text-muted);
    font-size: 0.9rem;
    opacity: 0.7;
    letter-spacing: 1px;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

@keyframes planeTakeoff {
    0% { 
        transform: translate(0, 0) scale(1) rotate(0deg); 
        clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
        opacity: 1; 
    }
    20% { 
        transform: translate(0, 0) scale(0.7) rotate(0deg); 
        clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
        opacity: 1; 
    }
    50% { 
        transform: translate(0, 0) scale(0.6) rotate(90deg); 
        clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
        opacity: 1; 
    }
    65% { 
        transform: translate(-30px, 10px) scale(0.5) rotate(90deg); 
        clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
        opacity: 1; 
    }
    100% { 
        transform: translate(150vw, -150vh) scale(0.2) rotate(90deg); 
        clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
        opacity: 0; 
    }
}
.home-page.taking-off {
    animation: planeTakeoff 2s cubic-bezier(0.5, 0, 0.2, 1) forwards;
}


/* --- HIDDEN NATIVE SCROLLBAR --- */
*::-webkit-scrollbar {
    display: none;
}
* {
    -ms-overflow-style: none;
    scrollbar-width: none;
}
body, html {
    overflow: hidden;
    margin: 0;
    padding: 0;
}


/* --- CUSTOM JS KEYCHAIN SCROLLBAR --- */
.custom-track {
    position: absolute;
    top: 20px;
    bottom: 20px;
    width: 2px;
    background: repeating-linear-gradient(to bottom, transparent, transparent 6px, rgba(100, 255, 218, 0.2) 6px, rgba(100, 255, 218, 0.2) 10px);
    z-index: 9999;
    pointer-events: none;
}
.custom-thumb {
    position: absolute;
    top: 0;
    transform-origin: top center;
    will-change: transform;
    pointer-events: auto;
    cursor: grab;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
}
.custom-thumb:active { cursor: grabbing; }

#custom-scrollbar-track { right: 15px; }
#custom-keychain { left: -29px; width: 60px; height: 150px; }

#sidebar-scrollbar-track { right: 2px; opacity: 0.6; }
#sidebar-keychain { left: -14px; width: 30px; height: 75px; }


/* --- SKY BACKGROUND --- */
#sky-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
    z-index: -1;
    overflow: hidden;
}
.cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.8;
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
}
.cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
}
/* Cloud 1 */
.cloud-1 { width: 150px; height: 50px; top: 20%; left: 10%; animation: floatCloud 20s linear infinite; }
.cloud-1::before { width: 70px; height: 70px; top: -30px; left: 20px; }
.cloud-1::after { width: 50px; height: 50px; top: -20px; right: 20px; }
/* Cloud 2 */
.cloud-2 { width: 200px; height: 60px; top: 40%; right: 15%; animation: floatCloud 25s linear infinite reverse; }
.cloud-2::before { width: 90px; height: 90px; top: -40px; left: 30px; }
.cloud-2::after { width: 70px; height: 70px; top: -30px; right: 30px; }
/* Cloud 3 */
.cloud-3 { width: 120px; height: 40px; top: 70%; left: 30%; animation: floatCloud 18s linear infinite; }
.cloud-3::before { width: 50px; height: 50px; top: -25px; left: 15px; }
.cloud-3::after { width: 40px; height: 40px; top: -15px; right: 15px; }

@keyframes floatCloud {
    0% { transform: translateX(0); }
    50% { transform: translateX(30px); }
    100% { transform: translateX(0); }
}

/* --- Parts of a Plane Overhaul --- */
.parts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    margin: 1.5rem 0;
}
.part-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, border-color 0.3s ease;
}
.part-card:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    background: rgba(100, 255, 218, 0.05);
}
.sticker-icon {
    position: absolute;
    top: 1.2rem;
    right: 1.2rem;
    width: 32px;
    height: 32px;
    color: var(--accent);
    opacity: 0.8;
}
.part-card h4 {
    margin-top: 0;
    font-size: 1.2rem;
    color: var(--text-light);
    margin-bottom: 0.8rem;
    padding-right: 40px;
}
.part-card p {
    margin: 0;
    font-size: 0.95rem;
    color: var(--text-muted);
}

.modern-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.modern-table th, .modern-table td {
    padding: 1rem;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}
.modern-table th {
    background: rgba(100, 255, 218, 0.1);
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.85rem;
    letter-spacing: 1px;
}
.modern-table tr:hover td {
    background: rgba(255, 255, 255, 0.04);
}
.modern-table td strong {
    color: var(--text-main);
}

/* --- SCROLL TO TOP BUTTON --- */
#scroll-to-top-btn {
    position: fixed;
    bottom: 40px;
    right: 80px; /* Leaves room for the keychain scrollbar */
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: var(--accent);
    color: var(--bg-darker);
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 15px rgba(100, 255, 218, 0.4);
    opacity: 0;
    visibility: hidden;
    transform: translateY(20px);
    transition: all 0.3s ease;
    z-index: 1000;
}
#scroll-to-top-btn i {
    width: 32px;
    height: 32px;
}
#scroll-to-top-btn.visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}
#scroll-to-top-btn:hover {
    transform: translateY(-8px);
    box-shadow: 0 8px 25px rgba(100, 255, 218, 0.6);
    background-color: var(--accent-hover);
}

/* --- NEW QUIZ TYPES --- */
.quiz-blank-input {
    width: 100%;
    padding: 1rem;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--text-main);
    font-size: 1rem;
    margin-bottom: 1rem;
    font-family: inherit;

    <script>
const courseData = [
    {
        id: "intro",
        title: "Introduction",
        hasVideo: false,
        textContent: `
            <h2>Welcome to Understanding the Airplane</h2>
            
            <div style="background: rgba(100, 255, 218, 0.05); padding: 1.5rem; border-left: 4px solid var(--accent); margin: 2rem 0; border-radius: 4px;">
                <h3 style="color: var(--text-light); margin-top: 0;">What is Aeronautics?</h3>
                <p style="margin-bottom: 0;"><span class="physics-term" data-definition="The study or practice of travel through the air.">Aeronautics</span> is the science of <span class="physics-term" data-definition="The process by which an object moves through space without contacting any planetary surface.">flight</span>. It encompasses everything from the physical laws that allow a heavy machine to leave the ground, to the high-tech engineering required to build engines capable of producing tens of thousands of pounds of <span class="physics-term" data-definition="The forward force produced by the powerplant/propeller or rotor.">thrust</span>.</p>
            </div>

            <p>In this interactive course, you will learn the fundamental principles of flight, the complex engineering behind modern aircraft design, and the intricate systems that keep airplanes safely in the sky.</p>
            
            <p>The journey from the Wright brothers' first flight in 1903 to the modern <span class="physics-term" data-definition="Speed that exceeds the speed of sound (Mach 1 or approx. 768 mph).">supersonic</span> jets of today has been driven by a relentless pursuit of <span class="physics-term" data-definition="The ratio of the aerodynamic lift to the aerodynamic drag of an aircraft.">aerodynamic efficiency</span> and engineering perfection. This course is designed to break down those complex concepts into easy-to-understand, visual modules.</p>

            <h3 style="margin-top: 2rem;">Course Structure</h3>
            <p>We will cover the following key areas:</p>
            <ol style="margin-bottom: 2rem; color: var(--text-muted);">
                <li><strong><span class="physics-term" data-definition="The study of the properties of moving air and the interaction between the air and solid bodies moving through it.">Aerodynamics</span>:</strong> How the invisible forces of air can be manipulated to generate <span class="physics-term" data-definition="A force that directly opposes the weight of an airplane and holds it in the air.">Lift</span>.</li>
                <li><strong>Structures:</strong> The physical anatomy of an airplane, from the <span class="physics-term" data-definition="The main body of an aircraft.">fuselage</span> to the <span class="physics-term" data-definition="The tail assembly of an aircraft, providing stability and control.">empennage</span>.</li>
                <li><strong><span class="physics-term" data-definition="The action of driving or pushing forward.">Propulsion</span>:</strong> How jet engines compress air and burn fuel to create massive amounts of thrust.</li>
                <li><strong>Systems:</strong> The hydraulic, pneumatic, and environmental control systems that act as the aircraft's nervous system.</li>
            </ol>

            <p><strong>How to use this course:</strong></p>
            <ul style="color: var(--text-muted);">
                <li>Navigate through the topics using the sidebar menu on the left.</li>
                <li>Watch the Animated Videos to Visualize and Understand.</li>
                <li>Read through the comprehensive textual content and hover over highlighted physics terms to instantly see their scientific definitions.</li>
                <li>At the end of each section, switch to the <strong>Knowledge Check</strong> tab to test what you've learned!</li>
            </ul>
        `,
        quiz: [] // No quiz for intro
    },
    {
        id: "parts-of-plane",
        title: "Parts of a Plane",
        hasVideo: false,
        textContent: `
            <iframe 
                src="components/aerolearn_airplane_parts.html"
                style="width:100%; height:520px; border:none;">
            </iframe>


            <h2>Parts of a Plane</h2>
            <p>The design of an airplane is a masterclass in structural engineering and fluid dynamics. Every part is meticulously engineered to manage the four fundamental forces of flight: <span class="physics-term" data-definition="Upward force acting on the aircraft.">lift</span>, <span class="physics-term" data-definition="Downward force caused by gravity.">weight</span>, <span class="physics-term" data-definition="Forward force produced by the powerplant.">thrust</span>, and <span class="physics-term" data-definition="Backward force caused by air resistance.">drag</span>.</p>

            <h3>Primary Structural Components</h3>
            <div class="parts-grid">
                <div class="part-card">
                    <i data-lucide="box" class="sticker-icon"></i>
                    <h4>Fuselage</h4>
                    <p>The main body of the aircraft. Designed to be highly <span class="physics-term" data-definition="Having a shape that reduces the drag from air moving past.">aerodynamic</span>, it minimizes drag while maintaining structural integrity to withstand intense pressure changes.</p>
                </div>
                
                <div class="part-card">
                    <i data-lucide="wind" class="sticker-icon"></i>
                    <h4>Wings</h4>
                    <p>The primary lift-generating devices. They utilize an <span class="physics-term" data-definition="A streamlined shape designed to generate lift when fluid flows around it.">airfoil</span> shape to create a pressure differential (higher pressure below, lower pressure above), generating upward lift.</p>
                </div>

                <div class="part-card">
                    <i data-lucide="navigation" class="sticker-icon"></i>
                    <h4>Empennage (Tail)</h4>
                    <p>Provides critical stability. It includes the <strong>Vertical Stabilizer</strong> (prevents side-to-side <span class="physics-term" data-definition="Rotation around the vertical axis.">yaw</span>) and <strong>Horizontal Stabilizer</strong> (prevents nose-up/down <span class="physics-term" data-definition="Rotation around the lateral axis.">pitch</span>).</p>
                </div>

                <div class="part-card">
                    <i data-lucide="flame" class="sticker-icon"></i>
                    <h4>Powerplant</h4>
                    <p>The engine system responsible for propulsion. Housed in <span class="physics-term" data-definition="A streamlined housing or enclosure for an engine.">nacelles</span>, these jet engines burn fuel to generate massive thrust to overcome drag.</p>
                </div>

                <div class="part-card" style="grid-column: 1 / -1;">
                    <i data-lucide="circle-dashed" class="sticker-icon"></i>
                    <h4>Landing Gear</h4>
                    <p>The shock-absorbing structure allowing the aircraft to taxi, take off, and land. Often retractable to severely reduce drag during flight.</p>
                </div>
            </div>

            <h3 style="margin-top: 2rem;">Flight Control Surfaces</h3>
            <p>Moveable components attached to the main structures that allow the pilot to change the aircraft's attitude and direction in the air.</p>

            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Control Surface</th>
                        <th>Location</th>
                        <th>Axis Controlled</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Ailerons</strong></td>
                        <td>Trailing edge of wings</td>
                        <td><span class="physics-term" data-definition="Rotation around the longitudinal (front-to-back) axis.">Roll</span></td>
                        <td>Move in opposite directions to bank the plane left or right.</td>
                    </tr>
                    <tr>
                        <td><strong>Elevators</strong></td>
                        <td>Horizontal stabilizer</td>
                        <td><span class="physics-term" data-definition="Rotation around the lateral (side-to-side) axis.">Pitch</span></td>
                        <td>Control the nose up or down to climb or descend.</td>
                    </tr>
                    <tr>
                        <td><strong>Rudder</strong></td>
                        <td>Vertical stabilizer</td>
                        <td><span class="physics-term" data-definition="Rotation around the vertical axis.">Yaw</span></td>
                        <td>Moves the nose left or right.</td>
                    </tr>
                    <tr>
                        <td><strong>Flaps & Slats</strong></td>
                        <td>Wings (Front & Back)</td>
                        <td>Lift Augmentation</td>
                        <td>Increases wing curvature to allow flying at low speeds without <span class="physics-term" data-definition="A sudden reduction in the lift generated by an airfoil.">stalling</span>.</td>
                    </tr>
                </tbody>
            </table>

            <h3 style="margin-top: 2rem;">Hidden Engineering</h3>
            <div class="parts-grid">
                <div class="part-card">
                    <i data-lucide="cpu" class="sticker-icon" style="color: var(--highlight);"></i>
                    <h4>Avionics (The Brain)</h4>
                    <p>The electronic nervous system. It includes the Flight Management System (FMS) and <span class="physics-term" data-definition="A system that replaces conventional manual flight controls with an electronic interface.">Fly-by-Wire</span> technology, which turns pilot inputs into digital commands.</p>
                </div>
                <div class="part-card">

            <h2>Systems Architecture & Deep Integration</h2>

            <h2>Parts vs. Components: The Paradigm Shift</h2>
            <p>In advanced aerospace engineering and aircraft maintenance, distinguishing between a "Part" and a "Component" is absolutely critical. They represent entirely different paradigms of the aircraft's lifecycle, supply chain, and troubleshooting methodology.</p>
            
            <p>A mechanic replacing a part uses a wrench; an engineer diagnosing a component uses a laptop and a <span class="physics-term" data-definition="A device used to test and diagnose electronic logic circuits.">Digital Multimeter</span> to track <span class="physics-term" data-definition="The difference in electrical potential between two points.">Voltage Drops</span> across a massive network.</p>

            <table class="feature-table">
                <thead>
                    <tr>
                        <th>Aspect</th>
                        <th>The "Parts" Perspective</th>
                        <th>The "Components" Perspective</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Definition</strong></td>
                        <td>A singular, physical, tangible item that cannot be meaningfully disassembled further.</td>

                    </tr>
                    <tr>
                        <td><strong>Analogy</strong></td>
                        <td>A specific titanium screw, a copper wire, or a silicon microchip.</td>
                        <td>The entire functioning Operating System or a complete hydraulic pump assembly.</td>

                        <td>The <strong>How</strong> (Logical execution, operational performance, data throughput).</td>
                    </tr>
                    <tr>
                        <td><strong>Failure Mode</strong></td>
                        <td>A localized hardware failure (e.g., a hinge snaps due to <span class="physics-term" data-definition="Deterioration of a material due to chemical reactions with its environment.">Corrosion</span>).</td>
                        <td>A systemic or logical failure (e.g., a software bug causing an infinite loop in the autopilot).</td>
                    </tr>
                </tbody>
            </table>

            <div class="highlight-box">
                <h3><i data-lucide="settings"></i> Real-World Example: The Flap Deployment System</h3>
                <p>If a single high-strength steel bolt holding a wing flap breaks under load, that is a classic <strong>Part Failure</strong>. The solution is simply to unscrew it and replace it. However, if the Fly-By-Wire computer encounters a sensor glitch and sends the wrong deployment angle to the electric flap motors, the physical parts are perfectly fine, but the <strong>Component Capability</strong> has failed. Troubleshooting this requires analyzing <span class="physics-term" data-definition="Information sent electronically between aircraft systems.">Digital Telemetry Data</span> rather than looking for a broken piece of metal.</p>

            <h2>How does an Airplane Fly? The Aerodynamic Truth</h2>
            <p>Flight is the absolute mastery of fluid dynamics. An aircraft, weighing hundreds of tons, takes off by manipulating the invisible air around it to generate a massive, sustained <span class="physics-term" data-definition="Upward aerodynamic force opposing the weight of the aircraft.">Lift Force</span> that physically exceeds the downward pull of <span class="physics-term" data-definition="The force that attracts a body toward the center of the earth.">Gravity</span>.</p>
            
            <p>For decades, there has been a debate over whether planes fly because of pressure differences (Bernoulli) or because they skip off the air like a stone (Newton). The truth is, both principles work simultaneously to keep the aircraft suspended in the sky.</p>

            <div class="content-grid">
                <div class="glass-panel">
                    <h3><i data-lucide="wind"></i> Bernoulli's Principle (The Vacuum)</h3>
                    <p>The wing is shaped as a highly engineered <strong>Airfoil</strong> (curved on top, flatter on the bottom). As the wing tears through the atmosphere at 500 MPH, the air traveling over the extended curve of the top must accelerate to keep up. According to Daniel Bernoulli's fluid equations, a faster-moving fluid inherently creates an area of <strong>Low Pressure</strong>. The standard, higher pressure atmosphere beneath the wing essentially pushes the airplane upward into this artificial vacuum.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="arrow-down-up"></i> Newton's Third Law (The Deflection)</h3>
                    <p>"For every action, there is an equal and opposite reaction." The underside of the wing strikes the oncoming air at a slight upward angle. This angle physically deflects millions of pounds of air downwards every single minute. The violent reaction to pushing all that <span class="physics-term" data-definition="The amount of matter contained in a volume of air.">Air Mass</span> down is a massive, reactive force pushing the wing (and the airplane) up.</p>
                </div>
            </div>

            <div class="highlight-box">
                <h3><i data-lucide="alert-triangle"></i> The Ultimate Danger: The Aerodynamic Stall</h3>
                <p>Lift is entirely dependent on smooth, attached <span class="physics-term" data-definition="Airflow where fluid particles follow smooth paths without crossing.">Laminar Airflow</span>. If the pilot pulls the nose up too aggressively, the <span class="physics-term" data-definition="The angle between the oncoming air and the wing's chord line.">Angle of Attack</span> becomes dangerously steep. The air can no longer bend to follow the steep curve of the wing. It violently separates from the metal, turning into chaotic, tumbling <span class="physics-term" data-definition="Chaotic, irregular fluid flow characterized by swirling eddies.">Turbulent Eddies</span>. This instantly destroys the low-pressure zone, causing an aerodynamic <strong>Stall</strong>. The wing completely stops flying, and the aircraft simply falls like a rock until airflow is restored.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "According to Bernoulli's principle, faster-moving air over the wing creates an area of:", options: ["High Pressure", "Low Pressure", "Zero Gravity", "Turbulence"], answer: 1, exp: "Faster fluid creates low pressure, effectively creating a vacuum above the wing." },
            { type: 'fill-blank', q: "If the Angle of Attack becomes too steep, the wing will _________.", answer: "stall", altAnswers: ["Stall", "stall"], exp: "A stall occurs when the air separates from the wing, destroying lift instantly." },
            { type: 'match', q: "Match the aerodynamic concept to its effect:", pairs: [ { left: "Low pressure above wing", right: "Bernoulli's Principle" }, { left: "Deflecting air downwards", right: "Newton's Third Law" }, { left: "Chaotic swirling eddies", right: "Turbulence" } ], exp: "Both Bernoulli and Newton explain how lift is generated." },

            { type: 'mcq', q: "Newton's Third Law states that for every action, there is an:", options: ["Equal and opposite reaction", "Unequal reaction", "Increase in pressure", "Aerodynamic stall"], answer: 0, exp: "Pushing air down forces the wing up." },

            { type: 'mcq', q: "Why does air travel faster over the top of the wing?", options: ["Because it is colder", "Because the curved shape forces it to travel a longer distance in the same time", "Because the engines push it", "Because of the flaps"], answer: 1, exp: "The extended curve of the airfoil forces the air to accelerate to keep up." }

            <h2>Do All Aircraft Have Winglets? The War on Drag</h2>
            <p>Look closely at the tips of a modern airliner's wings—you'll likely see them sweeping upward into graceful, shark-fin like vertical barriers. These are called <strong>Winglets</strong>, and they represent one of the most brilliant, billions-of-dollars-saving aerodynamic inventions in modern commercial aviation history.</p>
            
            <p>To understand why they exist, we must understand the invisible, energy-draining tornados that plague every single aircraft that takes to the skies.</p>

            <div class="highlight-box">
                <h3><i data-lucide="repeat"></i> The Problem: Wingtip Vortices</h3>
                <p>Because there is high-pressure air trapped under the wing and low-pressure air above it, the air naturally tries to escape. At the very tip of the wing, the high-pressure air aggressively rolls over the edge to fill the low-pressure void on top. As the plane moves forward, this rolling action creates massive, horizontal, spinning tornados of air trailing behind the plane known as <span class="physics-term" data-definition="Circular patterns of violently rotating air left behind a wing as it generates lift.">Wingtip Vortices</span>.</p>
                <p>Creating these massive tornados requires immense physical energy from the engines, which manifests as <span class="physics-term" data-definition="Aerodynamic drag produced specifically by the generation of lift.">Induced Drag</span>, slowing the plane down and wasting thousands of gallons of expensive jet fuel.</p>
            </div>

            <div class="content-grid">
                <div class="glass-panel">
                    <h3><i data-lucide="check-circle"></i> The Winglet Solution</h3>
                    <p>By adding a physical vertical barrier right at the tip, the high-pressure air is literally blocked from rolling over onto the top. This dramatically shrinks the size and intensity of the vortices. This simple addition reduces induced drag by up to 5%—saving airlines millions of dollars and drastically reducing carbon emissions over the lifespan of the aircraft.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="x-circle"></i> Why Don't All Planes Have Them?</h3>
                    <p>Winglets are not magic; they add structural weight and complex <span class="physics-term" data-definition="Twisting forces applied to a structural component.">Torsional Stresses</span> to the wing. For extremely short-haul flights, the fuel saved during the brief cruise phase isn't enough to offset the extra weight the engines had to carry during the steep climb. Also, some hyper-efficient planes (like the Boeing 777) achieve the same exact aerodynamic efficiency by simply making their wings significantly longer and incredibly flexible instead.</p>
                </div>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "What is the primary purpose of winglets?", options: ["To look cool", "To hold extra fuel", "To block high-pressure air from rolling over the wingtip", "To serve as antennas"], answer: 2, exp: "Winglets physically block the air, reducing wingtip vortices." },
            { type: 'fill-blank', q: "Wingtip vortices cause _________ drag, which wastes fuel.", answer: "induced", altAnswers: ["Induced", "induced"], exp: "Induced drag is the byproduct of generating lift." },
            { type: 'match', q: "Match the Winglet fact to its explanation:", pairs: [ { left: "Vertical Barrier", right: "Blocks Air Roll-Over" }, { left: "Fuel Savings", right: "Up to 5%" }, { left: "Boeing 777 Strategy", right: "Longer, flexible wings instead" } ], exp: "Winglets are incredible fuel savers, though some planes just use exceptionally long wings." },
            { type: 'mcq', q: "Where is high-pressure air naturally trapped on a wing?", options: ["Above the wing", "Inside the cabin", "Under the wing", "In the engines"], answer: 2, exp: "High pressure pushes up from under the wing to create lift." },
            { type: 'fill-blank', q: "Air rolling over the wingtip creates massive, spinning _________ of air trailing behind the plane.", answer: "vortices", altAnswers: ["Vortices", "vortices", "tornados"], exp: "These are called wingtip vortices." },

            { type: 'mcq', q: "For which type of flight are winglets LEAST effective?", options: ["14-hour international flights", "Extremely short-haul flights", "Medium-haul domestic flights", "Trans-oceanic flights"], answer: 1, exp: "The fuel saved during a brief cruise phase isn't enough to offset the extra weight carried during the climb." },

    {
        id: "primary-flying-controls",
        title: "Primary Flying Controls",
        hasVideo: false,
        textContent: `
            <iframe 
                src="components/roll_pitch_yaw_controls.html"
                style="width:100%; height:520px; border:none;">
            </iframe>

            <h2>Primary Flying Controls & Fly-By-Wire</h2>
            <p>An aircraft moves in a fluid, three-dimensional space around its <span class="physics-term" data-definition="The exact point where the total mass of the aircraft is perfectly balanced.">Center of Gravity</span>. Unlike a car that only turns left and right, pilots must command rotation across three distinct, invisible axes. They achieve this using primary aerodynamic control surfaces located on the trailing edges of the wings and tail.</p>

            <table class="feature-table">
                <thead>
                    <tr>
                        <th>Control Surface</th>
                        <th>Location</th>
                        <th>Axis of Rotation</th>
                        <th>Pilot Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Ailerons</strong></td>
                        <td>Outer trailing edge of both main wings</td>
                        <td><span class="physics-term" data-definition="Rotation around the longitudinal (front-to-back) axis, banking the wings.">Roll</span></td>
                        <td>Turning the control yoke left or right.</td>
                    </tr>
                    <tr>
                        <td><strong>Elevators</strong></td>
                        <td>Horizontal Stabilizer (The mini wings on the tail)</td>
                        <td><span class="physics-term" data-definition="Rotation around the lateral (side-to-side) axis, pointing the nose up or down.">Pitch</span></td>
                        <td>Pulling back or pushing forward on the control yoke.</td>
                    </tr>
                    <tr>
                        <td><strong>Rudder</strong></td>
                        <td>Vertical Stabilizer (The upright fin on the tail)</td>
                        <td><span class="physics-term" data-definition="Rotation around the vertical axis, sweeping the nose left or right.">Yaw</span></td>
                        <td>Pressing the left or right rudder foot pedals on the floor.</td>
                    </tr>
                </tbody>
            </table>

            <div class="highlight-box">
                <h3><i data-lucide="cpu"></i> The Fly-By-Wire Revolution</h3>
                <p>In older, mechanical planes, the pilot's yoke was literally connected to the distant control surfaces via miles of heavy steel cables, metal pulleys, and rigid pushrods. It was physically exhausting to fly.</p>
                <p>Modern airliners utilize state-of-the-art <strong>Fly-By-Wire</strong> technology. When the pilot moves the joystick, they are only moving a digital sensor. Supercomputers calculate exactly how much the ailerons or elevators should move based on current airspeed, altitude, and <span class="physics-term" data-definition="The ratio of the speed of the aircraft to the speed of sound in the surrounding air.">Mach Number</span>. The computer then sends electronic light-speed signals to massive hydraulic actuators to physically muscle the surfaces into place. This allows the computer to enforce "flight envelope protection," outright preventing human pilots from making dangerous, aggressive maneuvers that could overstress and snap the wings.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "Which control surface controls the 'Pitch' of the aircraft?", options: ["Ailerons", "Rudder", "Elevators", "Flaps"], answer: 2, exp: "Elevators, located on the horizontal stabilizer, control the nose up/down movement." },
            { type: 'fill-blank', q: "Modern airliners use _________-by-wire technology instead of heavy steel cables.", answer: "fly", altAnswers: ["Fly", "fly by wire", "fly-by-wire"], exp: "Fly-by-wire replaces manual cables with digital computers and electronic signals." },
            { type: 'match', q: "Match the control surface to its axis:", pairs: [ { left: "Ailerons", right: "Roll" }, { left: "Elevators", right: "Pitch" }, { left: "Rudder", right: "Yaw" } ], exp: "These are the three primary axes of aerodynamic flight." },
            { type: 'mcq', q: "What pilot action controls Roll via the ailerons?", options: ["Pressing the foot pedals", "Pulling back on the yoke", "Turning the control yoke left or right", "Adjusting the throttle"], answer: 2, exp: "Turning the yoke banks the wings left or right." },
            { type: 'fill-blank', q: "An aircraft moves in a fluid, three-dimensional space around its Center of _________.", answer: "gravity", altAnswers: ["Gravity", "gravity"], exp: "All three axes of rotation intersect at the Center of Gravity." },
            { type: 'match', q: "Match the control surface to its location:", pairs: [ { left: "Ailerons", right: "Outer trailing edge of main wings" }, { left: "Elevators", right: "Horizontal Stabilizer" }, { left: "Rudder", right: "Vertical Stabilizer" } ], exp: "Control surfaces are located far from the center of gravity to maximize leverage." },
            { type: 'mcq', q: "What does the Rudder control?", options: ["Pitch", "Roll", "Speed", "Yaw"], answer: 3, exp: "The rudder sweeps the nose left or right around the vertical axis." },
            { type: 'fill-blank', q: "In Fly-By-Wire, computers send electronic signals to massive _________ actuators to physically muscle the surfaces.", answer: "hydraulic", altAnswers: ["Hydraulic", "hydraulic"] , exp: "Hydraulic actuators act as the muscles." },
            { type: 'mcq', q: "What is 'flight envelope protection'?", options: ["A plastic cover for the aircraft", "A computer algorithm preventing pilots from making dangerous maneuvers", "A thermal blanket for the engines", "A type of parachute"], answer: 1, exp: "The fly-by-wire system will override pilot inputs that would overstress or snap the wings." },
            { type: 'mcq', q: "In older mechanical planes, what connected the pilot's yoke to the control surfaces?", options: ["Wi-Fi", "Bluetooth", "Miles of heavy steel cables and pulleys", "Optical fibers"], answer: 2, exp: "This made flying physically exhausting due to the aerodynamic forces." }
        ]

    {
        id: "empennage",
        title: "The Role of the Tailplane / Empennage",
        hasVideo: false,
        textContent: `
            <iframe 
                src="components/tailplane_empennage_explainer.html"
                style="width:100%; height:520px; border:none;">
            </iframe>

            <h2>The Role of the Tailplane (Empennage)</h2>
            <p>The empennage is the entire, complex tail assembly of the aircraft. It is the silent guardian of the sky. Without it, the airplane would be completely aerodynamically unstable. The nose would violently whip around, and the aircraft would tumble uncontrollably through the sky like a leaf caught in a hurricane.</p>

            <div class="content-grid">
                <div class="glass-panel">
                    <h3><i data-lucide="arrow-up-circle"></i> The Vertical Stabilizer</h3>
                    <p>This is the massive upright fin towering at the rear of the tail. It acts exactly like the feathers on the back of an arrow or a rooftop weather vane. By providing a large surface area behind the center of gravity, the rushing air forcefully keeps the nose pointed directly straight into the relative wind, preventing the aircraft from uncontrollably swinging side-to-side (a deadly phenomenon known as <span class="physics-term" data-definition="A coupled rolling and yawing motion that can quickly become uncontrollable.">Dutch Roll</span>).</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="arrow-right-circle"></i> The Horizontal Stabilizer</h3>
                    <p>These are the mini-wings jutting out horizontally from the tail. Curiously, on almost all modern airliners, they generate <strong>downward</strong> force, not upward lift! Because the aircraft's incredibly heavy center of gravity (engines, fuel, cargo) is located slightly in front of the main wings' center of lift, the nose naturally wants to pitch down and dive towards the earth. The horizontal stabilizer acts as an aerodynamic see-saw, constantly pushing the tail down to keep the massive plane perfectly balanced and level in flight.</p>
                </div>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "What is the entire tail assembly called?", options: ["Fuselage", "Empennage", "Nacelle", "Aileron"], answer: 1, exp: "The empennage consists of the vertical and horizontal stabilizers." },
            { type: 'fill-blank', q: "The Horizontal Stabilizer usually generates _________ force, not upward lift.", answer: "downward", altAnswers: ["Downward", "down"], exp: "Because the plane is nose-heavy, the tail must push down to keep it level." },
            { type: 'match', q: "Match the Empennage component to its function:", pairs: [ { left: "Vertical Fin", right: "Prevents Yaw (Dutch Roll)" }, { left: "Horizontal Mini-Wings", right: "Prevents Pitching Dive" } ], exp: "The tail acts exactly like the feathers on an arrow." },
            { type: 'mcq', q: "What happens if an aircraft loses its Horizontal Stabilizer?", options: ["It flies faster", "The nose will pitch down into an unrecoverable dive", "It turns left", "Nothing"], answer: 1, exp: "The downward force of the tail is required to counteract the heavy nose." },
            { type: 'fill-blank', q: "The vertical fin acts like a giant _________ vane to keep the nose pointed into the wind.", answer: "weather", altAnswers: ["Weather", "weather"], exp: "It automatically corrects side-to-side slipping." },
            { type: 'match', q: "Match the Stabilizer to the control surface attached to it:", pairs: [ { left: "Vertical Stabilizer", right: "Rudder" }, { left: "Horizontal Stabilizer", right: "Elevator" } ], exp: "The stabilizers are the fixed portions; the control surfaces are the moving flaps attached to them." },
            { type: 'mcq', q: "Why is the center of gravity placed slightly ahead of the main wings?", options: ["To make the plane look better", "For natural stall recovery stability", "To save fuel", "Because the engines are heavy"], answer: 1, exp: "A nose-heavy plane will naturally pitch down to regain speed if it stalls." },
            { type: 'fill-blank', q: "The side-to-side swinging motion prevented by the vertical stabilizer is called _________ roll.", answer: "dutch", altAnswers: ["Dutch", "dutch", "Dutch roll"] , exp: "Dutch roll is an uncomfortable combination of rolling and yawing." },
            { type: 'mcq', q: "What part of an arrow functions exactly like the aircraft's empennage?", options: ["The broadhead", "The wooden shaft", "The fletching (feathers)", "The bowstring"], answer: 2, exp: "The feathers create drag at the rear, keeping the heavy tip pointed forward." },
            { type: 'mcq', q: "Is the empennage primarily for generating lift?", options: ["Yes, it lifts the heavy tail", "No, it primarily provides stability and control leverage", "Yes, it replaces the main wings at high altitude", "No, it generates forward thrust"], answer: 1, exp: "It acts as a stabilizing lever arm, not a primary lifting surface." }
        ]
    },
    {
        id: "landing-gear-and-brakes",
        title: "Landing Gear and Brakes",
        hasVideo: false,
        textContent: `
            <iframe 
                src="components/landing_gear_carbon_brakes.html"
                style="width:100%; height:520px; border:none;">
            </iframe>

            <h2>Landing Gear and Carbon Brakes</h2>
            <p>The landing gear is the only part of the aircraft that physically touches the earth. It must support the entire static weight of the aircraft—sometimes over a million pounds for a massive A380—while absorbing the immense, punishing kinetic energy of landing on concrete at high speeds.</p>

            <div class="content-grid">
                <div class="glass-panel">
                    <h3><i data-lucide="anchor"></i> Oleo Shock Struts</h3>
                    <p>The main titanium legs of the landing gear. They are essentially massive, highly engineered hydraulic shock absorbers called <span class="physics-term" data-definition="A shock absorber used on aircraft landing gear utilizing compressed air and hydraulic fluid.">Oleo-Pneumatic Struts</span>. Filled with specialized hydraulic fluid and highly compressed nitrogen gas, they cushion the brutal vertical impact of landing, preventing the structural frame of the wing from snapping under the <span class="physics-term" data-definition="Forces that push or squeeze a material, reducing its volume.">Compressive Stress</span>.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="circle-dashed"></i> Wheels and Bogies</h3>
                    <p>Large commercial airliners use a multi-wheel "bogie" (a cart-like structure) on each main gear strut. This is strictly designed to distribute the immense, crushing weight over a significantly larger surface area of the runway, dramatically reducing the <span class="physics-term" data-definition="The pressure exerted by the aircraft tires on the runway surface.">Pavement Loading</span> and preventing the aircraft from literally sinking into the asphalt.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="disc"></i> Carbon-Carbon Brakes</h3>
                    <p>Airplane brakes must bring hundreds of tons of metal moving at 160+ MPH to a dead stop in seconds. Modern airliners use stacks of high-tech <span class="physics-term" data-definition="A composite material consisting of carbon fiber reinforcement in a matrix of graphite.">Carbon-Carbon Composite</span> brake discs. They are incredibly light and can absorb and dissipate massive amounts of thermal energy, frequently glowing bright orange (over 1,000°C) during heavy, aggressive braking scenarios.</p>
                </div>
            </div>

            <div class="highlight-box">
                <h3><i data-lucide="shield-alert"></i> Anti-Skid Systems & Hydroplaning</h3>
                <p>If a pilot slams on the brakes at 150 MPH, the massive rubber wheels would instantly lock up. The intense friction would cause the tires to explode, leading to a catastrophic loss of directional control. Furthermore, on wet runways, the locked tires would ride on a thin layer of water, a dangerous condition known as <span class="physics-term" data-definition="When a layer of water builds between the wheels and the road surface, leading to a loss of traction.">Dynamic Hydroplaning</span>. Aircraft feature hyper-fast, computerized <span class="physics-term" data-definition="An electronic system that prevents wheel lockup during braking.">Anti-Skid</span> networks that sense when a wheel is about to stop spinning, and instantly release and re-apply hydraulic brake pressure multiple times a millisecond—much like ABS in a car, but immensely more powerful and precise.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "What type of brakes do modern airliners typically use?", options: ["Steel Drum Brakes", "Carbon-Carbon Composite Discs", "Hydraulic Parachutes", "Magnetic Brakes"], answer: 1, exp: "Carbon-carbon discs are incredibly light and can absorb massive amounts of thermal energy without melting." },
            { type: 'fill-blank', q: "Landing gear struts use highly compressed _________ gas alongside hydraulic fluid to absorb shock.", answer: "nitrogen", altAnswers: ["Nitrogen", "nitrogen"], exp: "Nitrogen gas acts as a powerful pneumatic spring to cushion the impact." },
            { type: 'match', q: "Match the Landing Gear component to its function:", pairs: [ { left: "Oleo Struts", right: "Absorb vertical impact" }, { left: "Bogies", right: "Distribute aircraft weight" }, { left: "Anti-Skid System", right: "Prevents wheel lockup" } ], exp: "Each component plays a critical role in safely returning the aircraft to the ground." },
            { type: 'mcq', q: "What is the main advantage of Carbon-Carbon brakes over steel brakes?", options: ["They look shinier", "They are significantly lighter and absorb heat better", "They are much cheaper to produce", "They last forever without wear"], answer: 1, exp: "Weight savings translates directly to fuel savings, and they handle extreme temperatures safely." },
            { type: 'fill-blank', q: "The multi-wheel truck assemblies that distribute the massive weight of the aircraft over runway tarmac are called _________.", answer: "bogies", altAnswers: ["Bogies", "bogies"] , exp: "Bogies prevent the aircraft from sinking into the concrete." },
            { type: 'match', q: "Match the braking system to its automotive equivalent:", pairs: [ { left: "Aircraft Anti-Skid System", right: "Car ABS (Anti-lock Braking System)" }, { left: "Carbon-Carbon Discs", right: "F1 Racing Car Brakes" } ], exp: "Aerospace technology often shares roots with high-performance automotive tech." },
            { type: 'mcq', q: "How many times per second can the anti-skid system modulate brake pressure?", options: ["Once a minute", "10 times per second", "Over 1000 times per second", "It cannot modulate"], answer: 2, exp: "Microprocessors detect wheel slip and adjust hydraulic pressure instantaneously to prevent a blown tire." },
            { type: 'fill-blank', q: "The heavy-duty shock absorbers in the landing gear are called _________ struts.", answer: "oleo", altAnswers: ["Oleo", "oleo", "oleo-pneumatic"], exp: "Oleo struts use a mix of oil (hydraulic fluid) and compressed nitrogen gas." },
            { type: 'mcq', q: "What happens if the landing gear fails to retract after takeoff?", options: ["The flight continues normally", "Massive aerodynamic drag is created, burning excess fuel", "The plane instantly stalls", "The engines shut down"], answer: 1, exp: "Landing gear is not aerodynamic; leaving it down ruins fuel efficiency." },
            { type: 'mcq', q: "Why is Nitrogen used in Oleo struts instead of compressed air?", options: ["It is cheaper", "It is inert and won't explode under extreme pressure or heat", "It makes the plane lighter", "It is a liquid"], answer: 1, exp: "Normal air contains oxygen which can ignite under high pressure; nitrogen is safe." }
        ]
    }
);

        textContent: `

            <h2>Function of Gear & Brakes: The Thermodynamics of Stopping</h2>
            <p>Landing a massive aircraft is fundamentally an exercise in extreme energy management. An aircraft in flight possesses a terrifying amount of <span class="physics-term" data-definition="The energy an object possesses due to its motion (1/2 mass * velocity^2).">Kinetic Energy</span>. To stop safely before running out of runway, the fundamental laws of thermodynamics dictate that this energy cannot be destroyed—it must be violently converted into another form.</p>

            <table class="feature-table">
                <thead>
                    <tr>
                        <th>Energy State</th>
                        <th>Component Responsible</th>
                        <th>How Energy is Converted</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Vertical Kinetic Energy</strong> (Falling out of the sky at 500+ feet per minute)</td>
                        <td>Landing Gear Struts</td>
                        <td>Converted to Heat. The hydraulic fluid is forcefully pushed through tiny, restrictive <span class="physics-term" data-definition="A precisely sized hole used to control the flow rate of fluid.">Metering Orifices</span> inside the strut, converting the downward smash into thermal energy and smooth compression.</td>
                    </tr>
                    <tr>
                        <td><strong>Horizontal Kinetic Energy</strong> (Moving forward down the runway at 160 MPH)</td>
                        <td>Carbon Brakes & Thrust Reversers</td>
                        <td>Converted to Extreme Heat. The carbon brake discs use immense, clamping <span class="physics-term" data-definition="The resistance that one surface or object encounters when moving over another.">Friction</span> to convert forward momentum into massive amounts of thermal radiation. Simultaneously, Thrust Reversers open to push engine exhaust forward, using <span class="physics-term" data-definition="Aerodynamic drag intentionally created to slow the aircraft.">Aerodynamic Braking</span>.</td>
                    </tr>
                </tbody>
            </table>

            <div class="highlight-box">
                <h3><i data-lucide="flame"></i> The Ultimate Test: RTO (Rejected Takeoff)</h3>
                <p>The single most demanding, terrifying scenario for an aircraft braking system is a <strong>Rejected Takeoff (RTO)</strong> at maximum gross weight, initiated just milliseconds before the plane lifts off the ground. In this extreme emergency, the carbon brakes must single-handedly absorb the titanic energy required to stop a fully fueled, fully loaded aircraft without the aid of aerodynamic drag. The carbon discs will glow white-hot and the tires may intentionally deflate (via melting <span class="physics-term" data-definition="A safety plug in the wheel rim that melts at high temperatures to safely deflate the tire.">Thermal Fuse Plugs</span>) to prevent a violent, shrapnel-producing explosion from the intense expanding gas.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "Landing an aircraft is an exercise in extreme energy management. What type of energy must be destroyed?", options: ["Potential Energy", "Kinetic Energy", "Chemical Energy", "Nuclear Energy"], answer: 1, exp: "The massive kinetic energy (motion) must be converted into heat to safely stop." },
            { type: 'fill-blank', q: "During an RTO (Rejected Takeoff), carbon brakes may glow red-hot and intentionally melt the _________ fuse plugs in the tires.", answer: "thermal", altAnswers: ["Thermal", "thermal"], exp: "Thermal fuse plugs intentionally deflate the tires to prevent an explosion from the expanding hot gas." },
            { type: 'match', q: "Match the energy state to how it is handled:", pairs: [ { left: "Vertical Kinetic Energy (Falling)", right: "Absorbed by Strut Fluid" }, { left: "Horizontal Kinetic Energy (Rolling)", right: "Converted to Heat by Brakes" }, { left: "Rejected Takeoff Energy", right: "Absorbed by Brakes Only" } ], exp: "Energy cannot be destroyed, only converted or absorbed." },
            { type: 'mcq', q: "What does RTO stand for in aviation?", options: ["Ready To Operate", "Rejected Takeoff", "Right Turn Only", "Rotational Thrust Output"], answer: 1, exp: "An RTO occurs when pilots abort the takeoff run at high speeds." },
            { type: 'fill-blank', q: "When brakes convert kinetic energy into thermal energy, the carbon discs can glow _________ hot.", answer: "red", altAnswers: ["Red", "red", "white"], exp: "The temperatures can exceed 1000 degrees Celsius during an emergency stop." },
            { type: 'match', q: "Match the stopping mechanism to its source:", pairs: [ { left: "Wheel Brakes", right: "Carbon Discs in Landing Gear" }, { left: "Thrust Reversers", right: "Engine Exhaust Deflectors" }, { left: "Spoilers", right: "Wing Panels that destroy lift" } ], exp: "It takes a combination of systems to stop a 400-ton aircraft." },
            { type: 'mcq', q: "Why do the tires have thermal fuse plugs?", options: ["To make them look shiny", "To safely release air pressure before the tire explodes from brake heat", "To measure speed", "To hold the rubber together"], answer: 1, exp: "A tire explosion can rip apart the wing structure and fuel tanks." },
            { type: 'fill-blank', q: "During a rejected takeoff, thrust _________ are used to deflect engine exhaust forward to help stop the plane.", answer: "reversers", altAnswers: ["Reversers", "reversers", "reverser"], exp: "Thrust reversers take the immense power of the engine and use it for braking." },
            { type: 'mcq', q: "What is the primary function of wing spoilers during landing?", options: ["To look cool for passengers", "To instantly destroy aerodynamic lift and firmly plant the wheels onto the runway", "To generate more thrust", "To cool the brakes"], answer: 1, exp: "If the wings are still lifting, the wheel brakes have no traction." },
            { type: 'mcq', q: "Can an aircraft brake purely using thrust reversers?", options: ["Yes, that is the primary method", "No, wheel brakes absorb over 80% of the kinetic energy", "Yes, but it takes 10 miles", "No, thrust reversers are a myth"], answer: 1, exp: "Thrust reversers assist, but the carbon wheel brakes do the vast majority of the stopping." }
        ]
    },
    {
        id: "pressurization",
        title: "Pressurization & Air Conditioning",
        hasVideo: false,
        textContent: `
            <iframe 
                src="components/pressurization_simulation.html"
                style="width:100%; height:520px; border:none;">
            </iframe>
            <h2>The Pressurization System: Surviving the Stratosphere</h2>
            <p>At an airliner's cruising altitude of 35,000 feet, the outside environment is instantly lethal. The air pressure is a mere 25% of what it is at sea level, the temperature plummets to -60°F (-50°C), and there is so little oxygen that a human would suffer <span class="physics-term" data-definition="A condition in which the body or a region of the body is deprived of adequate oxygen supply.">Hypoxia</span> and lose consciousness in under 30 seconds. To survive, the aircraft must act as a sealed, highly regulated titanium pressure vessel.</p>

            <div class="content-grid">
                <div class="glass-panel">
                    <h3><i data-lucide="wind"></i> Bleed Air & The Packs</h3>
                    <p>To pressurize the vast interior cabin, the aircraft taps (or "bleeds") high-pressure, scorching hot air directly from the spinning compressor stages of the jet engines. This <span class="physics-term" data-definition="Compressed air taken from the engine compressor stage before fuel is injected.">Bleed Air</span> is nearly 400°C. It is immediately routed through powerful Air Conditioning PACKs (Pneumatic Air Conditioning Kits) which use complex air-cycle machines to cool it down to a comfortable 70°F before violently pumping it into the passenger cabin.</p>
                </div>
                <div class="glass-panel">
                    <h3><i data-lucide="activity"></i> The Outflow Valve</h3>
                    <p>The cabin is continuously pumped full of fresh, pressurized air. To prevent the fuselage from literally popping like a balloon, an automated, motorized <strong>Outflow Valve</strong> at the rear of the plane constantly modulates—opening and closing slightly—letting a highly controlled amount of air escape back into the atmosphere. It's exactly like inflating a balloon that has a controllable leak.</p>
                </div>
            </div>

            <div class="highlight-box">
                <h3><i data-lucide="mountain"></i> Cabin Altitude vs. Physical Altitude</h3>
                <p>Even though the plane is physically flying through the lethal thin air at 35,000 feet, the dense pressure inside the cabin is artificially maintained at an equivalent of 6,000 to 8,000 feet (this is referred to as the <span class="physics-term" data-definition="The equivalent altitude of the air pressure inside the aircraft.">Cabin Altitude</span>). If a window breaks or the hull is breached, the high-pressure cabin air instantly and violently escapes into the low-pressure outside atmosphere—a terrifying event known as an <span class="physics-term" data-definition="A rapid drop in cabin pressure caused by structural failure.">Explosive Decompression</span>, which causes the immediate deployment of oxygen masks.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "How does an aircraft pressurize its cabin at 35,000 feet?", options: ["By carrying giant tanks of compressed air", "By sucking air through the windows", "By tapping high-pressure 'Bleed Air' from the engines", "By spinning a fan in the cabin"], answer: 2, exp: "Hot bleed air is taken from the engine compressor, cooled, and pumped into the cabin." },

        textContent: `

            <h2>Airplane Engines: Turbines vs. Pistons</h2>
            <p>Aircraft engines are the beating heart of aviation. They fall into two primary mechanical categories based on exactly how they convert chemical energy (fuel) into mechanical energy (thrust). Both rely on the violent combustion of fossil fuels, but their internal mechanics and physics are entirely different paradigms.</p>

            <table class="feature-table">
                <thead>
                    <tr>
                        <th>Engine Category</th>
                        <th>Core Mechanism</th>
                        <th>Best Use Case & Physics</th>
                        <th>Example Aircraft</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Piston (Reciprocating) Engine</strong></td>
                        <td>Uses enclosed cylinders and reciprocating pistons (exactly like a Honda Civic) to spin a crankshaft attached to a propeller.</td>
                        <td>Low altitude, slow speed. Highly susceptible to <span class="physics-term" data-definition="A decrease in engine power due to lower air density at high altitudes.">Altitude Power Loss</span> because thinner air provides less oxygen for combustion.</td>
                        <td>Cessna 172, Piper Archer.</td>
                    </tr>
                    <tr>
                        <td><strong>Turboprop Engine</strong></td>
                        <td>Uses a continuous-combustion jet engine core, but instead of shooting thrust out the back, it uses the exhaust gas to spin a massive turbine connected to a complex <span class="physics-term" data-definition="A mechanical system that reduces the high RPM of the jet core to a lower, usable RPM for the propeller.">Reduction Gearbox</span>, which spins a massive propeller.</td>
                        <td>Medium altitude, medium speed. Phenomenal at generating immediate, massive thrust for extremely short runways.</td>
                        <td>ATR 72, Bombardier Dash 8.</td>
                    </tr>
                    <tr>
                        <td><strong>High-Bypass Turbofan (Jet)</strong></td>
                        <td>Uses a jet core to spin a titanic titanium fan at the very front. The vast majority of the air blown by this fan goes <em>around</em> the burning core, bypassing it entirely.</td>
                        <td>High altitude, high subsonic speed (Mach 0.85). Incredibly fuel-efficient at altitude and drastically quieter than older jets.</td>
                        <td>Boeing 777, Airbus A350.</td>
                    </tr>
                </tbody>
            </table>

            <div class="highlight-box">
                <h3><i data-lucide="plane"></i> Why Turbofans Dominate the Skies</h3>
                <p>Pure turbojets (which shoot 100% of their superheated exhaust out the back as a high-speed jet of fire, like a military fighter jet or the Concorde) are incredibly loud, violent, and highly fuel-inefficient at subsonic speeds. Modern commercial airliners exclusively use <strong>High-Bypass Turbofans</strong>. Because 80% of the cold air propelled by the massive front fan bypasses the explosive core entirely, it creates a thick "blanket" of cold, slow air wrapping around the ultra-fast, screaming hot exhaust jet. This cold blanket acts as a natural muffler, drastically reducing noise pollution while providing massive, efficient thrust.</p>
            </div>
            
        `,
        quiz: [
            { type: 'mcq', q: "What type of engine is used on almost all modern commercial airliners?", options: ["Piston Engine", "High-Bypass Turbofan", "Turbojet", "Scramjet"], answer: 1, exp: "High-Bypass Turbofans are incredibly efficient and significantly quieter than older turbojets." },
            { type: 'fill-blank', q: "In a turbofan engine, the vast majority of the air propelled by the front fan _________ the burning core entirely.", answer: "bypasses", altAnswers: ["Bypasses", "bypasses", "bypass"], exp: "This bypass air provides the majority of the thrust and creates a cold, quiet blanket around the hot exhaust jet." },
            { type: 'match', q: "Match the engine type to its best use case:", pairs: [ { left: "Piston Engine", right: "Low altitude, slow speed Cessna" }, { left: "Turboprop", right: "Medium altitude, short runway Commuters" }, { left: "Turbofan", right: "High altitude, high subsonic speed Airliners" } ], exp: "Different engines use different aerodynamic properties." },
            { type: 'mcq', q: "What percentage of thrust is typically generated by the massive front fan in a modern turbofan?", options: ["10%", "50%", "Up to 80%", "100%"], answer: 2, exp: "The core jet engine mainly exists just to spin the massive fan, which acts like a giant enclosed propeller." },
            { type: 'fill-blank', q: "The 'Bypass _________' is a metric comparing the amount of air bypassing the core vs entering the core.", answer: "ratio", altAnswers: ["Ratio", "ratio"], exp: "A high bypass ratio (like 10:1) means 10 times more air bypasses the core than enters it." },
            { type: 'match', q: "Match the component to its characteristic:", pairs: [ { left: "Front Fan Blades", right: "Made of hollow titanium, sweeping massive air" }, { left: "Engine Core", right: "Screaming hot, burns jet fuel" }, { left: "Cowling (Nacelle)", right: "Aerodynamic housing reducing drag" } ], exp: "Every part of the engine is highly specialized." },
            { type: 'mcq', q: "Why are high-bypass turbofans quieter than older turbojets?", options: ["They have mufflers", "The cold bypass air wraps around the screaming hot exhaust, dampening the shear noise", "They burn less fuel", "They spin slower"], answer: 1, exp: "The mixing of cold and hot air dramatically reduces the acoustic shockwave." },
            { type: 'fill-blank', q: "Older fighter jets and the Concorde used pure _________ engines, where 100% of the air goes through the fiery core.", answer: "turbojet", altAnswers: ["Turbojet", "turbojet", "turbojets"], exp: "Turbojets are extremely loud and fuel-thirsty but great for supersonic speeds." },
            { type: 'mcq', q: "What happens if a bird strikes the front fan?", options: ["The plane instantly explodes", "The fan blades are designed to shred the bird and often continue operating safely", "The engines shut off automatically", "The pilots must eject"], answer: 1, exp: "Engines undergo extreme testing, including firing frozen birds into them at high speeds." },
